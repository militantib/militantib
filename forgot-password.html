<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Njala University SmartCampus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy: #0A192F; --navy-light: #112240; --gold: #C9A84C;
      --white: #FFFFFF; --gray-50: #F8FAFC; --gray-100: #F1F5F9;
      --gray-200: #E2E8F0; --gray-300: #CBD5E1; --gray-400: #94A3B8;
      --gray-500: #64748B; --gray-600: #475569; --gray-700: #334155;
      --gray-900: #0F172A; --success: #10B981; --error: #EF4444;
      --info: #3B82F6; --radius: 12px; --transition: all 0.2s ease;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem;
    }
    .card { max-width: 440px; width: 100%; background: var(--white); border-radius: var(--radius); box-shadow: 0 8px 40px rgba(0,0,0,.12); overflow: hidden; }
    .header { background: var(--navy); padding: 2rem; text-align: center; }
    .header h1 { color: var(--white); font-size: 1.2rem; font-weight: 700; }
    .header p { color: var(--gray-400); font-size: 0.85rem; margin-top: 0.25rem; }
    .body { padding: 2rem; }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--gray-700); margin-bottom: 0.35rem; }
    .input-wrapper { position: relative; display: flex; align-items: center; }
    .input-wrapper .icon { position: absolute; left: 12px; color: var(--gray-400); pointer-events: none; }
    .input-wrapper input { width: 100%; padding: 0.75rem 0.75rem 0.75rem 2.5rem; border: 1.5px solid var(--gray-200); border-radius: 8px; font-size: 0.9rem; font-family: inherit; transition: var(--transition); background: var(--gray-50); }
    .input-wrapper input:focus { outline: none; border-color: var(--navy); box-shadow: 0 0 0 3px rgba(10,25,47,.08); }
    .btn { width: 100%; padding: 0.8rem; background: var(--navy); color: var(--white); border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: var(--transition); font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .btn:hover { background: var(--navy-light); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg { display: none; background: #FEF2F2; color: var(--error); font-size: 0.85rem; padding: 0.65rem 0.85rem; border-radius: 8px; margin-bottom: 1rem; text-align: center; border: 1px solid #FECACA; }
    .error-msg.visible { display: block; }
    .success-msg { display: none; background: #F0FDF4; color: #166534; font-size: 0.85rem; padding: 0.65rem 0.85rem; border-radius: 8px; margin-bottom: 1rem; text-align: center; border: 1px solid #BBF7D0; }
    .success-msg.visible { display: block; }
    .back-link { display: block; text-align: center; margin-top: 1rem; font-size: 0.85rem; color: var(--info); text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
    .spinner { display: none; }
    .btn.loading .spinner { display: inline-block; animation: spin 0.8s linear infinite; }
    .btn.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1><i class="fas fa-key"></i> Forgot Password</h1>
      <p>Reset your SmartCampus account password</p>
    </div>
    <div class="body">
      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <form id="forgotForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope icon"></i>
            <input type="email" id="email" placeholder="Enter your registered email" required>
          </div>
        </div>
        <button type="submit" class="btn" id="submitBtn">
          <i class="fas fa-paper-plane"></i>
          <span class="btn-text">Send Reset Link</span>
          <span class="spinner"><i class="fas fa-spinner"></i></span>
        </button>
      </form>

      <a href="login.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Login</a>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    (function() {
      const form = document.getElementById('forgotForm');
      const emailInput = document.getElementById('email');
      const errorEl = document.getElementById('errorMsg');
      const successEl = document.getElementById('successMsg');
      const submitBtn = document.getElementById('submitBtn');

      // Prefill email from query param
      const params = new URLSearchParams(window.location.search);
      if (params.get('email')) {
        emailInput.value = params.get('email');
      }

      function showError(msg) { errorEl.textContent = msg; errorEl.classList.add('visible'); }
      function hideError() { errorEl.classList.remove('visible'); }
      function showSuccess(msg) { successEl.textContent = msg; successEl.classList.add('visible'); }
      function hideSuccess() { successEl.classList.remove('visible'); }

      function setLoading(loading) {
        submitBtn.disabled = loading;
        submitBtn.classList.toggle('loading', loading);
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();
        hideSuccess();

        const email = emailInput.value.trim();
        if (!email) { showError('Please enter your email address.'); return; }

        setLoading(true);

        try {
          const result = await SmartCampusAPI.forgotPassword(email);
          showSuccess(result.message || 'If the email exists, a reset link has been sent.');

          // In dev mode, show the reset token
          if (result.resetToken) {
            const tokenInfo = document.createElement('div');
            tokenInfo.style.cssText = 'margin-top: 0.75rem; padding: 0.65rem; background: #EFF6FF; border: 1px solid #BFDBFE; border-radius: 8px; font-size: 0.78rem; color: #1E40AF; word-break: break-all;';
            tokenInfo.innerHTML = '<strong>Dev Mode:</strong> Reset token: <code style="font-size:0.75rem;">' + result.resetToken + '</code><br><a href="reset-password.html?token=' + encodeURIComponent(result.resetToken) + '" style="color:#2563EB;">Click here to reset</a>';
            document.querySelector('.body').appendChild(tokenInfo);
          }
        } catch (ex) {
          showError(ex.message || 'Request failed. Please try again.');
        } finally {
          setLoading(false);
        }
      });
    })();
  </script>
</body>
</html>
