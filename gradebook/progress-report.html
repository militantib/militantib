<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progress Report - SmartCampus</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @media print { body { font-size: 12pt; } .no-print { display: none !important; } .report-page { box-shadow: none; border: none; margin: 0; padding: 0; } }
    body { background: #f4f5f7; font-family: 'Segoe UI', Arial, sans-serif; }
    .report-page { max-width: 900px; margin: 2rem auto; background: #fff; padding: 2.5rem 3rem; box-shadow: 0 2px 12px rgba(0,0,0,.08); border-radius: 6px; }
    .report-header { text-align: center; margin-bottom: 2rem; border-bottom: 3px double #1e3a8a; padding-bottom: 1.5rem; }
    .report-header .logo-placeholder { width: 70px; height: 70px; border: 2px solid #1e3a8a; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 700; color: #1e3a8a; margin-bottom: .5rem; }
    .report-header h1 { margin: .25rem 0 .1rem; font-size: 1.4rem; color: #1e3a8a; letter-spacing: 1px; }
    .report-header .uni-details { font-size: .82rem; color: #4b5563; line-height: 1.6; }
    .report-title { text-align: center; font-size: 1.1rem; font-weight: 700; margin: 1.5rem 0; padding: .5rem; background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 4px; }
    .student-info { display: grid; grid-template-columns: 1fr 1fr; gap: .3rem 2rem; font-size: .85rem; margin-bottom: 1.5rem; padding: 1rem; background: #f9fafb; border-radius: 4px; }
    .student-info .label { font-weight: 600; color: #374151; }
    section { margin-bottom: 1.5rem; }
    section h3 { font-size: .95rem; color: #1e3a8a; margin: 0 0 .4rem; border-bottom: 1px solid #e5e7eb; padding-bottom: .3rem; }
    table { width: 100%; border-collapse: collapse; font-size: .82rem; }
    th { background: #1e3a8a; color: #fff; text-align: left; padding: .4rem .6rem; font-weight: 600; }
    td { padding: .35rem .6rem; border-bottom: 1px solid #e5e7eb; }
    tr:nth-child(even) td { background: #f9fafb; }
    .text-right { text-align: right; }
    .text-center { text-align: center; }
    .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin: 1rem 0; }
    .summary-card { text-align: center; padding: .75rem; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 6px; }
    .summary-card .val { font-size: 1.3rem; font-weight: 700; color: #166534; }
    .summary-card .lbl { font-size: .72rem; color: #4b5563; margin-top: .15rem; }
    .standing-badge { display: inline-block; padding: .25rem 1rem; border-radius: 999px; font-weight: 700; font-size: .85rem; }
    .standing-dean { background: #fef3c7; color: #92400e; }
    .standing-good { background: #d1fae5; color: #065f46; }
    .standing-probation { background: #fee2e2; color: #991b1b; }
    .standing-fail { background: #fce4ec; color: #b71c1c; }
    .remark-box { padding: 1rem; background: #f9fafb; border-left: 4px solid #1e3a8a; border-radius: 4px; font-size: .85rem; line-height: 1.5; margin: 1rem 0; }
    .signatures { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #e5e7eb; font-size: .82rem; }
    .signatures .sig-line { margin-top: 2.5rem; border-top: 1px solid #374151; width: 80%; padding-top: .3rem; font-weight: 600; }
    .grading-scale { font-size: .75rem; color: #6b7280; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #e5e7eb; }
    .grading-scale table { font-size: .72rem; }
    .grading-scale th { background: #4b5563; }
    .grading-scale td { padding: .2rem .5rem; }
    .loading { text-align: center; padding: 4rem; }
    @media (max-width: 700px) { .student-info { grid-template-columns: 1fr; } .summary-grid { grid-template-columns: 1fr; } .signatures { grid-template-columns: 1fr; } .report-page { padding: 1.5rem; margin: 1rem; } }
  </style>
</head>
<body>
  <div class="no-print" id="sidebarMount"></div>
  <div class="main-content" style="margin-left:0;padding:1rem">
    <div class="no-print" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <button class="btn btn-outline" onclick="history.back()">&larr; Back</button>
      <button class="btn btn-primary" onclick="window.print()"><i class="fa-solid fa-print"></i> Print / PDF</button>
    </div>

    <div class="report-page" id="reportContainer">
      <div class="loading" id="loadingMsg">
        <i class="fa-solid fa-spinner fa-spin fa-2x" style="color:var(--primary)"></i>
        <p style="margin-top:.5rem">Loading progress report...</p>
      </div>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/api.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        const params = new URLSearchParams(window.location.search);
        const studentId = params.get("id");
        const acYear = params.get("academicYear") || "2025/2026";
        if (!studentId) { document.getElementById("reportContainer").innerHTML = '<div class="loading" style="color:var(--error)">Missing student ID</div>'; return; }

        try {
          const data = await SmartCampusAPI.fetchProgressReport(studentId, acYear);
          renderReport(data);
        } catch (ex) {
          document.getElementById("reportContainer").innerHTML = `<div class="loading" style="color:var(--error)">Failed to load report: ${esc(ex.message)}</div>`;
        }
      });

      function esc(v) { return String(v).replace(/[&<>"']/g, c => '&#' + c.charCodeAt(0) + ';'); }

      function renderReport(r) {
        const s1 = r.semester1Courses || [];
        const s2 = r.semester2Courses || [];
        const scale = r.gradingScale || {};
        const standingClass = r.academicStanding === "Dean's List" ? "standing-dean" :
                             r.academicStanding === "Good Standing" ? "standing-good" :
                             r.academicStanding === "Probation" ? "standing-probation" : "standing-fail";

        let html = `
          <div class="report-header">
            <div class="logo-placeholder">SC</div>
            <h1>SMARTCAMPUS UNIVERSITY</h1>
            <div class="uni-details">
              School of Technology &middot; Main Campus<br>
              Freetown, Sierra Leone &middot; +232 76 000 000 &middot; info@smartcampus.edu<br>
              www.smartcampus.edu
            </div>
          </div>

          <div class="report-title">INDIVIDUAL PROGRESS REPORT &mdash; ${esc(r.academicYear)}</div>

          <div class="student-info">
            <div><span class="label">Student Name:</span> ${esc(r.studentName)}</div>
            <div><span class="label">Student ID:</span> ${esc(r.studentId)}</div>
            <div><span class="label">Programme:</span> ${esc(r.programme)}</div>
            <div><span class="label">Year:</span> ${esc(r.yearLevel)}</div>
            <div><span class="label">School:</span> ${esc(r.school)}</div>
            <div><span class="label">Academic Year:</span> ${esc(r.academicYear)}</div>
          </div>
        `;

        // Semester 1
        html += renderSemesterTable("Semester One", s1, r.gpaSemester1, r.totalCreditsS1);

        // Semester 2
        html += renderSemesterTable("Semester Two", s2, r.gpaSemester2, r.totalCreditsS2);

        // Summary
        html += `
          <section>
            <h3>SGPA Summary</h3>
            <div class="summary-grid">
              <div class="summary-card"><div class="val">${r.gpaSemester1.toFixed(2)}</div><div class="lbl">Semester 1 GPA</div></div>
              <div class="summary-card"><div class="val">${r.gpaSemester2.toFixed(2)}</div><div class="lbl">Semester 2 GPA</div></div>
              <div class="summary-card"><div class="val" style="font-size:1.5rem">${r.cgpa.toFixed(2)}</div><div class="lbl">CGPA (${r.totalCredits} Credit Hours)</div></div>
            </div>
          </section>
        `;

        // Academic Standing
        html += `
          <section>
            <h3>Academic Standing</h3>
            <div style="margin:.75rem 0">
              <span class="standing-badge ${standingClass}">${esc(r.academicStanding)}</span>
              &nbsp;(CGPA: ${r.cgpa.toFixed(2)})
            </div>
            <div class="remark-box"><strong>Remark:</strong> ${esc(r.remark)}</div>
          </section>
        `;

        // Signatures
        html += `
          <div class="signatures">
            <div><div class="sig-line">Dean, ${esc(r.school)}</div><div style="margin-top:.2rem;color:#6b7280">Signature &amp; Date</div></div>
            <div><div class="sig-line">University Registrar</div><div style="margin-top:.2rem;color:#6b7280">Signature &amp; Date</div></div>
          </div>
        `;

        // Grading Scale
        const scaleEntries = Object.entries(scale);
        html += `
          <div class="grading-scale">
            <strong>Grading System:</strong>
            <table style="margin-top:.3rem">
              <thead><tr><th>Grade</th><th>Description</th><th>Grade Point</th></tr></thead>
              <tbody>
                ${scaleEntries.map(([k, v]) => `<tr><td class="text-center" style="font-weight:700">${esc(k)}</td><td>${esc(v)}</td></tr>`).join('')}
              </tbody>
            </table>
          </div>
        `;

        document.getElementById("reportContainer").innerHTML = html;
      }

      function renderSemesterTable(title, courses, gpa, credits) {
        if (!courses || !courses.length) return `
          <section><h3>${title}</h3><p style="color:var(--gray-500);font-size:.82rem">No grades recorded for this semester.</p></section>
        `;
        const rows = courses.map(c => `
          <tr>
            <td>${esc(c.courseCode)}</td>
            <td>${esc(c.courseTitle)}</td>
            <td class="text-center">${c.credits || 0}</td>
            <td class="text-center" style="font-weight:700">${esc(c.letterGrade || '-')}</td>
          </tr>
        `).join('');
        return `
          <section>
            <h3>${title}</h3>
            <table>
              <thead><tr>
                <th style="width:100px">Course Code</th>
                <th>Course Description</th>
                <th style="width:80px" class="text-center">Credit Hours</th>
                <th style="width:90px" class="text-center">Grade Earned</th>
              </tr></thead>
              <tbody>${rows}</tbody>
            </table>
            <div style="text-align:right;font-size:.82rem;margin-top:.3rem;color:#4b5563">
              <strong>Total Credit Hours:</strong> ${credits} &nbsp;|&nbsp; <strong>SGPA:</strong> ${gpa.toFixed(2)}
            </div>
          </section>
        `;
      }
    </script>
  </div>
</body>
</html>
