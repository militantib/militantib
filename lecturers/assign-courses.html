<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assign Courses - SmartCampus</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root { --excel-header: #44546a; --excel-border: #d0d7de; }
    .breadcrumb { display: flex; flex-wrap: wrap; gap: .3rem .5rem; font-size: .85rem; padding: .6rem 0; }
    .breadcrumb a { color: var(--primary); text-decoration: none; }
    .breadcrumb span { color: var(--gray-500); }
    .breadcrumb .current { color: var(--gray-800); font-weight: 600; }
    .step-title { font-size: 1.1rem; font-weight: 700; margin-bottom: .75rem; display: flex; align-items: center; gap: .4rem; }
    .step-title i { color: var(--primary); }
    .two-panel { display: flex; gap: 1.5rem; align-items: flex-start; }
    .panel-left { flex: 0 0 340px; border: 1px solid var(--gray-200); border-radius: 10px; background: #fff; overflow: hidden; }
    .panel-right { flex: 1; min-width: 0; }
    .lec-search { width: 100%; padding: .6rem .75rem; border: none; border-bottom: 1px solid var(--gray-200); font-size: .85rem; outline: none; box-sizing: border-box; }
    .lec-list { max-height: 520px; overflow-y: auto; }
    .lec-item { display: flex; align-items: center; gap: .6rem; padding: .65rem .75rem; cursor: pointer; border-bottom: 1px solid var(--gray-100); transition: background .15s; }
    .lec-item:hover, .lec-item.active { background: #eef2ff; }
    .lec-item.active { border-left: 3px solid var(--primary); }
    .lec-item .l-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .8rem; flex-shrink: 0; }
    .lec-item .l-info { flex: 1; min-width: 0; }
    .lec-item .l-name { font-weight: 600; font-size: .85rem; }
    .lec-item .l-meta { font-size: .75rem; color: var(--gray-500); }
    .lec-item .l-count { font-size: .7rem; background: var(--gray-100); padding: .1rem .4rem; border-radius: 4px; white-space: nowrap; }
    .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: .5rem; }
    .course-grid label { display: flex; align-items: center; gap: .5rem; padding: .45rem .6rem; border: 1px solid var(--gray-200); border-radius: 6px; cursor: pointer; transition: all .15s; font-size: .82rem; }
    .course-grid label:hover { border-color: var(--primary); background: #f0f4ff; }
    .course-grid input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary); flex-shrink: 0; }
    .course-grid .c-code { font-weight: 600; color: var(--gray-700); }
    .course-grid .c-title { color: var(--gray-600); }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--gray-400); }
    .empty-state i { font-size: 2.5rem; margin-bottom: .6rem; display: block; }
    .sel-lecturer-info { display: flex; align-items: center; gap: .75rem; padding: .75rem 1rem; background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: 8px; margin-bottom: 1rem; }
    .sel-lecturer-info .sl-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .action-bar { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: 1rem; }
    .toast-success { background: var(--success); color: #fff; padding: .5rem 1rem; border-radius: 6px; font-size: .85rem; display: inline-flex; align-items: center; gap: .4rem; }
    .toast-error { background: var(--error); color: #fff; padding: .5rem 1rem; border-radius: 6px; font-size: .85rem; display: inline-flex; align-items: center; gap: .4rem; }
    .status-badge { font-size: .7rem; padding: .1rem .4rem; border-radius: 4px; }
    .badge-active { background: #d1fae5; color: #065f46; }
    .badge-inactive { background: var(--gray-200); color: var(--gray-600); }
    @media (max-width: 800px) { .two-panel { flex-direction: column; } .panel-left { flex: none; width: 100%; } }
  </style>
</head>
<body>
  <div id="sidebarMount"></div>
  <div class="main-content">
    <div class="top-bar"><button class="menu-toggle" type="button">☰</button><div class="role-selector"><label for="roleSelect">View as:</label><select id="roleSelect"></select></div></div>
    <div class="breadcrumb"><a href="../dashboard.html">Dashboard</a> <span>/</span> <a href="../manage-lecturers.html">Manage Lecturers</a> <span>/</span> <span class="current">Assign Courses</span></div>
    <h1 style="margin-bottom:.25rem">Assign Courses to Lecturers</h1>
    <p style="color:var(--gray-600);margin-top:0">Select a lecturer and check the courses they are approved to teach. Changes save in real-time.</p>
    <div id="appContainer">
      <div class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i><p>Loading...</p></div>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/render.js"></script>
  <script>
    var state = {
      lecturers: [], allCourses: [], programmes: [],
      selectedLecturer: null, selectedLecturerCourses: [],
      savedCourseIds: [],
      deptId: null, deptName: ''
    };

    document.addEventListener("DOMContentLoaded", async function() {
      if (!["Department Admin"].includes(currentRole)) {
        document.querySelector(".main-content").innerHTML = '<div style="text-align:center;padding:4rem"><h2 style="color:var(--error)">Access Denied</h2></div>';
        return;
      }
      await init();
    });

    async function init() {
      try {
        var u = {}; try { u = JSON.parse(localStorage.getItem("sc_user") || "{}"); } catch(e) {}
        var schools = await SmartCampusAPI.fetchSchools() || [];

        if (currentRole === "Department Admin" && u.department) {
          // Auto-resolve department
          for (var si = 0; si < schools.length; si++) {
            var d = (schools[si].departments || []).find(function(dd) { return dd.name === u.department || String(dd.id) === String(u.department); });
            if (d) {
              state.deptId = d.id;
              state.deptName = d.name;
              break;
            }
          }
        }

        if (!state.deptId) {
          // Show school/dept selection if not a Dept Admin
          showSchoolDeptPicker(schools);
          return;
        }

        await loadData();
      } catch(ex) {
        document.getElementById("appContainer").innerHTML = '<div class="empty-state"><i class="fa-solid fa-triangle-exclamation" style="color:var(--error)"></i><p>' + esc(ex.message) + '</p></div>';
      }
    }

    function showSchoolDeptPicker(schools) {
      var html = '<div class="step-title"><i class="fa-solid fa-school"></i>Select School</div><div class="hierarchy-grid">';
      schools.forEach(function(s) {
        html += '<div class="hierarchy-card" onclick="selectSchool(' + s.id + ')"><div class="h-icon"><i class="fa-solid fa-school"></i></div><div class="h-name">' + esc(s.name) + '</div></div>';
      });
      html += '</div><div id="deptContainer"></div>';
      document.getElementById("appContainer").innerHTML = html;
    }

    async function selectSchool(schoolId) {
      try {
        var depts = await SmartCampusAPI.fetchDepartments(schoolId) || [];
        var html = '<div class="step-title" style="margin-top:1rem"><i class="fa-solid fa-sitemap"></i>Select Department</div><div class="hierarchy-grid">';
        depts.forEach(function(d) {
          html += '<div class="hierarchy-card" onclick="selectDept(' + d.id + ',\'' + esc(d.name) + '\')"><div class="h-icon"><i class="fa-solid fa-building"></i></div><div class="h-name">' + esc(d.name) + '</div></div>';
        });
        html += '</div>';
        document.getElementById("deptContainer").innerHTML = html;
      } catch(ex) { SmartCampusUI.showToast(ex.message, "error"); }
    }

    function selectDept(id, name) {
      state.deptId = id;
      state.deptName = name;
      loadData();
    }

    async function loadData() {
      document.getElementById("appContainer").innerHTML = '<div class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i><p>Loading lecturers & courses...</p></div>';
      try {
        var results = await Promise.all([
          SmartCampusAPI.withFallback(function() { return apiFetch('/lecturers'); }, function() { return []; }),
          SmartCampusAPI.fetchCourses(state.deptId).catch(function() { return []; })
        ]) || [];
        var allLecs = results[0] || [];
        state.allCourses = results[1] || [];

        // Filter lecturers by department (match by department name or programme department)
        state.lecturers = [];
        var deptProgrammes = await SmartCampusAPI.fetchProgrammes(state.deptId).catch(function() { return []; }) || [];
        var deptProgIds = deptProgrammes.map(function(p) { return p.id; });
        allLecs.forEach(function(l) {
          if (l.department === state.deptName || deptProgIds.indexOf(l.programmeId) !== -1) {
            state.lecturers.push(l);
          }
        });

        // Fallback: if no lecturers matched by department, show all
        if (!state.lecturers.length && allLecs.length) {
          state.lecturers = allLecs;
        }

        renderLayout();
      } catch(ex) {
        document.getElementById("appContainer").innerHTML = '<div class="empty-state"><i class="fa-solid fa-triangle-exclamation" style="color:var(--error)"></i><p>' + esc(ex.message) + '</p></div>';
      }
    }

    function renderLayout() {
      if (!state.lecturers.length) {
        document.getElementById("appContainer").innerHTML = '<div class="empty-state"><i class="fa-solid fa-chalkboard-user"></i><p>No lecturers found for ' + esc(state.deptName) + '.</p></div>';
        return;
      }

      var lecHtml = '<div class="lec-search" id="lecSearch"><i class="fa-solid fa-search" style="margin-right:.4rem;color:var(--gray-400)"></i><input type="text" placeholder="Search lecturers..." onkeyup="filterLecturers(this.value)" style="border:none;outline:none;width:calc(100% - 20px);font-size:.85rem"></div>';
      lecHtml += '<div class="lec-list" id="lecList">';
      state.lecturers.forEach(function(l, i) {
        var initial = (l.name || '?').charAt(0).toUpperCase();
        var cCount = (l.assignedCourses || []).length;
        var statusCls = l.status === 'Active' ? 'badge-active' : 'badge-inactive';
        lecHtml += '<div class="lec-item" data-idx="' + i + '" onclick="selectLecturer(' + i + ')">';
        lecHtml += '<div class="l-avatar">' + initial + '</div>';
        lecHtml += '<div class="l-info"><div class="l-name">' + esc(l.name) + '</div><div class="l-meta">' + esc(l.email || '') + ' <span class="status-badge ' + statusCls + '">' + (l.status || 'Active') + '</span></div></div>';
        lecHtml += '<div class="l-count">' + cCount + ' course' + (cCount !== 1 ? 's' : '') + '</div>';
        lecHtml += '</div>';
      });
      lecHtml += '</div>';

      var rightHtml = '<div id="assignmentPanel"><div class="empty-state" style="padding:4rem 1rem"><i class="fa-solid fa-arrow-left"></i><p>Select a lecturer from the left panel to assign courses.</p></div></div>';

      document.getElementById("appContainer").innerHTML =
        '<div class="two-panel"><div class="panel-left">' + lecHtml + '</div><div class="panel-right">' + rightHtml + '</div></div>';

      // Auto-select first lecturer
      if (state.lecturers.length > 0) {
        selectLecturer(0);
      }
    }

    function filterLecturers(q) {
      q = q.toLowerCase();
      document.querySelectorAll(".lec-item").forEach(function(el) {
        var name = (el.querySelector(".l-name") || {}).textContent || '';
        el.style.display = name.toLowerCase().includes(q) ? '' : 'none';
      });
    }

    async function selectLecturer(idx) {
      state.selectedLecturer = state.lecturers[idx];
      // Update active state
      document.querySelectorAll(".lec-item").forEach(function(el) { el.classList.remove("active"); });
      var items = document.querySelectorAll(".lec-item");
      if (items[idx]) items[idx].classList.add("active");

      // Fetch fresh lecturer data to get current assigned courses
      try {
        var fresh = await apiFetch('/lecturers/' + state.selectedLecturer.id) || {};
        state.selectedLecturerCourses = (fresh.assignedCourses || []).map(function(c) { return c.courseId; });
        state.savedCourseIds = state.selectedLecturerCourses.slice();
      } catch(ex) {
        // Fallback to initial data
        state.selectedLecturerCourses = (state.selectedLecturer.assignedCourses || []).map(function(c) { return c.courseId || c.courseId; });
        state.savedCourseIds = state.selectedLecturerCourses.slice();
      }

      renderAssignmentPanel();
    }

    function renderAssignmentPanel() {
      var l = state.selectedLecturer;
      if (!l) return;
      var initial = (l.name || '?').charAt(0).toUpperCase();
      var changed = !arraysEqual(state.selectedLecturerCourses.sort(), state.savedCourseIds.slice().sort());
      var assignedCount = state.selectedLecturerCourses.length;

      var html = '<div class="sel-lecturer-info">';
      html += '<div class="sl-avatar">' + initial + '</div>';
      html += '<div><strong>' + esc(l.name) + '</strong><br><span style="font-size:.8rem;color:var(--gray-500)">' + esc(l.email || '') + ' &middot; <span id="assignedCount">' + assignedCount + '</span> course' + (assignedCount !== 1 ? 's' : '') + ' assigned</span></div>';
      html += '</div>';

      if (!state.allCourses.length) {
        html += '<div class="empty-state"><i class="fa-solid fa-book"></i><p>No courses found for this department.</p></div>';
      } else {
        html += '<div class="step-title" style="font-size:.95rem"><i class="fa-solid fa-book"></i>Select Courses to Assign</div>';
        html += '<div class="course-grid">';
        state.allCourses.forEach(function(c) {
          var checked = state.selectedLecturerCourses.indexOf(c.id) !== -1 ? 'checked' : '';
          html += '<label><input type="checkbox" value="' + c.id + '" ' + checked + ' onchange="toggleCourse(' + c.id + ', this.checked)">';
          html += '<span class="c-code">' + esc(c.code || '') + '</span> <span class="c-title">' + esc(c.title || '') + '</span>';
          html += '</label>';
        });
        html += '</div>';
      }

      html += '<div class="action-bar">';
      html += '<button class="btn btn-primary" id="saveBtn" onclick="saveAssignments()"' + (!changed ? ' disabled' : '') + '><i class="fa-solid fa-floppy-disk"></i> Save Changes</button>';
      html += '<span id="saveStatus"></span>';
      html += '</div>';

      document.getElementById("assignmentPanel").innerHTML = html;
    }

    function toggleCourse(courseId, checked) {
      var idx = state.selectedLecturerCourses.indexOf(courseId);
      if (checked && idx === -1) {
        state.selectedLecturerCourses.push(courseId);
      } else if (!checked && idx !== -1) {
        state.selectedLecturerCourses.splice(idx, 1);
      }
      var changed = !arraysEqual(state.selectedLecturerCourses.slice().sort(), state.savedCourseIds.slice().sort());
      var btn = document.getElementById("saveBtn");
      if (btn) btn.disabled = !changed;
      document.getElementById("assignedCount").textContent = state.selectedLecturerCourses.length;
    }

    async function saveAssignments() {
      var btn = document.getElementById("saveBtn");
      var statusEl = document.getElementById("saveStatus");
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';

      try {
        // Fetch current lecturer data to preserve other fields
        var lecData = await apiFetch('/lecturers/' + state.selectedLecturer.id) || {};

        var payload = {
          name: lecData.name || state.selectedLecturer.name || '',
          email: lecData.email || state.selectedLecturer.email || '',
          lecturerId: lecData.lecturerId || '',
          password: undefined,
          phone: lecData.phone || '',
          gender: lecData.gender || '',
          dateOfBirth: lecData.dateOfBirth || '',
          nationality: lecData.nationality || '',
          address: lecData.address || '',
          employmentType: lecData.employmentType || 'Full-Time',
          academicRank: lecData.academicRank || '',
          qualification: lecData.qualification || '',
          dateOfEmployment: lecData.dateOfEmployment || '',
          status: lecData.status || 'Active',
          loginApprovalStatus: lecData.loginApprovalStatus || 'Pending',
          schoolId: lecData.schoolId || (lecData.school ? null : null),
          programmeId: lecData.programmeId || null,
          courseIds: state.selectedLecturerCourses
        };

        await apiFetch('/lecturers/' + state.selectedLecturer.id, {
          method: 'PUT',
          body: JSON.stringify(payload)
        });

        state.savedCourseIds = state.selectedLecturerCourses.slice();
        statusEl.innerHTML = '<span class="toast-success"><i class="fa-solid fa-check-circle"></i> Saved successfully</span>';
        setTimeout(function() { statusEl.innerHTML = ''; }, 3000);

        // Update the course count in the lecturer list
        var lecItem = document.querySelector('.lec-item.active .l-count');
        if (lecItem) {
          var count = state.selectedLecturerCourses.length;
          lecItem.textContent = count + ' course' + (count !== 1 ? 's' : '');
        }
      } catch(ex) {
        statusEl.innerHTML = '<span class="toast-error"><i class="fa-solid fa-xmark-circle"></i> ' + esc(ex.message) + '</span>';
      }

      btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save Changes';
      if (!arraysEqual(state.selectedLecturerCourses.slice().sort(), state.savedCourseIds.slice().sort())) {
        btn.disabled = false;
      }
    }

    function arraysEqual(a, b) {
      if (a.length !== b.length) return false;
      for (var i = 0; i < a.length; i++) {
        if (a[i] !== b[i]) return false;
      }
      return true;
    }

    function esc(str) {
      if (typeof str !== 'string') return str;
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }
  </script>
</body>
</html>
