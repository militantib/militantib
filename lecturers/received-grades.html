<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Received Grades - SmartCampus</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root { --excel-header: #44546a; --excel-border: #d0d7de; }
    .breadcrumb { display: flex; flex-wrap: wrap; gap: .3rem .5rem; font-size: .85rem; padding: .6rem 0; }
    .breadcrumb a { color: var(--primary); text-decoration: none; }
    .breadcrumb span { color: var(--gray-500); }
    .breadcrumb .current { color: var(--gray-800); font-weight: 600; }
    .hierarchy-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
    .hierarchy-card { background: #fff; border: 1px solid var(--gray-200); border-radius: 10px; padding: 1.25rem; text-align: center; cursor: pointer; transition: all .2s; }
    .hierarchy-card:hover { border-color: var(--primary); box-shadow: 0 2px 12px rgba(0,0,0,.08); transform: translateY(-2px); }
    .hierarchy-card .h-icon { font-size: 1.8rem; color: var(--primary); margin-bottom: .5rem; }
    .hierarchy-card .h-name { font-weight: 600; font-size: .95rem; }
    .step-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; }
    .step-title i { margin-right: .4rem; color: var(--primary); }
    .excel-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
    .excel-table th { background: var(--excel-header); color: #fff; padding: .55rem .4rem; text-align: left; font-weight: 600; white-space: nowrap; }
    .excel-table td { padding: .4rem; border: 1px solid var(--excel-border); }
    .excel-table tr:nth-child(even) { background: #f8f9fa; }
    .excel-table tr:hover { background: #f0fdf4; }
    .badge-finalized { background: var(--success); color: #fff; padding: .15rem .5rem; border-radius: 10px; font-size: .7rem; }
    .badge-draft { background: var(--warning); color: #fff; padding: .15rem .5rem; border-radius: 10px; font-size: .7rem; }
    .badge-submitted { background: #3b82f6; color: #fff; padding: .15rem .5rem; border-radius: 10px; font-size: .7rem; }
    .action-bar { display: flex; gap: .3rem; flex-wrap: wrap; }
    .export-bar { display: flex; gap: .3rem; }
    .filter-bar { display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }
    .filter-bar select, .filter-bar input { padding: .45rem .6rem; border: 1px solid var(--gray-200); border-radius: 6px; }
    .empty-state { text-align: center; padding: 4rem 1rem; color: var(--gray-400); }
    .empty-state i { font-size: 3rem; margin-bottom: .75rem; }
    .modal-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal { background:#fff;border-radius:12px;padding:2rem;max-width:800px;width:90%;max-height:80vh;overflow-y:auto; }
    @media (max-width: 600px) { .hierarchy-grid { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
  <div id="sidebarMount"></div>
  <div class="main-content">
    <div class="top-bar"><button class="menu-toggle" type="button">☰</button><div class="role-selector"><label for="roleSelect">View as:</label><select id="roleSelect"></select></div></div>
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem">
      <h1 style="margin:0">Received Grades</h1>
      <a href="../manage-lecturers.html" class="btn btn-outline btn-sm">&larr; Back</a>
    </div>
    <div class="breadcrumb" id="breadcrumb"><a href="../manage-lecturers.html">Manage Lecturers</a> <span>/</span> <span class="current">Received Grades</span></div>
    <div id="stepContent"></div>
    <div id="gradeContent"></div>
  </div>

  <!-- Grade Sheet Modal -->
  <div class="modal-overlay" id="gradeModal">
    <div class="modal"><h3 id="gradeModalTitle">Grade Sheet</h3><div id="gradeModalBody"></div><button class="btn btn-outline btn-sm" onclick="closeGradeModal()" style="margin-top:1rem">Close</button></div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/render.js"></script>
  <script>
    const state = { schools:[],departments:[],programmes:[],courses:[],grades:[],
      selectedSchoolId:null,selectedSchoolName:'',selectedDeptId:null,selectedDeptName:'',
      selectedProgId:null,selectedProgName:'',selectedCourseId:null,selectedCourseName:'',
      selectedSemester:'Semester1',selectedAcademicYear:'2025/2026',currentStep:0 };

    document.addEventListener("DOMContentLoaded", async () => {
      if (!["University Super Admin","School Super Admin","Department Admin"].includes(currentRole)) { document.querySelector(".main-content").innerHTML = '<div style="text-align:center;padding:4rem"><h2 style="color:var(--error)">Access Denied</h2></div>'; return; }
      await loadSchools();
    });

    function buildBreadcrumb() {
      const bc = document.getElementById("breadcrumb");
      let html = '<a href="../manage-lecturers.html">Manage Lecturers</a> <span>/</span> <a href="received-grades.html">Received Grades</a>';
      if (state.selectedSchoolName) html += ` <span>/</span> <a href="#" onclick="event.preventDefault();resetTo(1)">${esc(state.selectedSchoolName)}</a>`;
      if (state.selectedDeptName) html += ` <span>/</span> <a href="#" onclick="event.preventDefault();resetTo(2)">${esc(state.selectedDeptName)}</a>`;
      if (state.selectedProgName) html += ` <span>/</span> <a href="#" onclick="event.preventDefault();resetTo(3)">${esc(state.selectedProgName)}</a>`;
      if (state.selectedCourseName) html += ` <span>/</span> <span class="current">${esc(state.selectedCourseName)}</span>`;
      bc.innerHTML = html;
    }
    function resetTo(step) {
      if(step<=1){state.selectedSchoolId=null;state.selectedSchoolName='';}
      if(step<=2){state.selectedDeptId=null;state.selectedDeptName='';}
      if(step<=3){state.selectedProgId=null;state.selectedProgName='';}
      if(step<=4){state.selectedCourseId=null;state.selectedCourseName='';}
      state.currentStep=step;buildBreadcrumb();
      document.getElementById("gradeContent").innerHTML='';
      if(step===1)renderSchools();else if(step===2)renderDepts();else if(step===3)renderProgs();
    }
    async function loadSchools(){try{state.schools=await SmartCampusAPI.fetchSchools()||[];state.currentStep=1;renderSchools();}catch(ex){showError(ex.message);}}
    function renderSchools(){let html='<div class="step-title"><i class="fa-solid fa-school"></i>Select a School</div><div class="hierarchy-grid">';state.schools.forEach(s=>{html+=`<div class="hierarchy-card" onclick="selectSchool('${s.id}','${esc(s.name)}')"><div class="h-icon"><i class="fa-solid fa-school"></i></div><div class="h-name">${esc(s.name)}</div></div>`;});html+='</div>';document.getElementById("stepContent").innerHTML=html;}
    async function selectSchool(id,name){state.selectedSchoolId=id;state.selectedSchoolName=name;try{state.departments=await SmartCampusAPI.fetchDepartments(id)||[];state.currentStep=2;buildBreadcrumb();renderDepts();}catch(ex){showError(ex.message);}}
    function renderDepts(){if(!state.departments.length){document.getElementById("stepContent").innerHTML='<div class="empty-state"><i class="fa-solid fa-building"></i><p>No departments.</p></div>';return;}let html='<div class="step-title"><i class="fa-solid fa-sitemap"></i>Select a Department</div><div class="hierarchy-grid">';state.departments.forEach(d=>{html+=`<div class="hierarchy-card" onclick="selectDept('${d.id}','${esc(d.name)}')"><div class="h-icon"><i class="fa-solid fa-building"></i></div><div class="h-name">${esc(d.name)}</div></div>`;});html+='</div>';document.getElementById("stepContent").innerHTML=html;}
    function selectDept(id,name){state.selectedDeptId=id;state.selectedDeptName=name;loadProgs(id);}
    async function loadProgs(deptId){try{state.programmes=await SmartCampusAPI.fetchProgrammes(deptId)||[];state.currentStep=3;buildBreadcrumb();renderProgs();}catch(ex){showError(ex.message);}}
    function renderProgs(){if(!state.programmes.length){document.getElementById("stepContent").innerHTML='<div class="empty-state"><i class="fa-solid fa-graduation-cap"></i><p>No programmes.</p></div>';return;}let html='<div class="step-title"><i class="fa-solid fa-graduation-cap"></i>Select a Programme</div><div class="hierarchy-grid">';state.programmes.forEach(p=>{html+=`<div class="hierarchy-card" onclick="selectProg('${p.id}','${esc(p.name)}')"><div class="h-icon"><i class="fa-solid fa-book-open"></i></div><div class="h-name">${esc(p.name)}</div></div>`;});html+='</div>';document.getElementById("stepContent").innerHTML=html;}
    async function selectProg(id,name){state.selectedProgId=id;state.selectedProgName=name;state.currentStep=4;buildBreadcrumb();loadCoursesForGrades();}

    async function loadCoursesForGrades() {
      const el = document.getElementById("stepContent");
      el.innerHTML = '<p style="color:var(--gray-300);text-align:center;padding:2rem"><i class="fa-solid fa-spinner fa-spin"></i> Loading courses...</p>';
      try {
        state.courses = await SmartCampusAPI.fetchCoursesByProgrammeAndYear(state.selectedProgId, null) || [];
        if (!state.courses.length) { el.innerHTML = '<div class="empty-state"><i class="fa-solid fa-book"></i><p>No courses.</p></div>'; return; }
        let html = `<div class="filter-bar">
          <select id="semFilterCourse" onchange="filterCourseCards()"><option value="Semester1">Semester One</option><option value="Semester2">Semester Two</option></select>
          <select id="yearFilterCourse" onchange="filterCourseCards()"><option value="2024/2025">2024/2025</option><option value="2025/2026" selected>2025/2026</option><option value="2026/2027">2026/2027</option></select>
          <span style="font-size:.82rem;color:var(--gray-500)">Filter will apply on grade view</span>
        </div>`;
        html += '<div class="step-title"><i class="fa-solid fa-book"></i>Select a Course</div><div class="hierarchy-grid" id="courseGrid">';
        state.courses.forEach(c => { html += `<div class="hierarchy-card" onclick="selectCourseForGrades('${c.id}','${esc(c.title)}')"><div class="h-icon"><i class="fa-solid fa-book"></i></div><div class="h-name">${esc(c.title)}</div><div class="h-count">${esc(c.code)}</div></div>`; });
        html += '</div>'; el.innerHTML = html;
      } catch (ex) { showError(ex.message); }
    }

    function filterCourseCards() {
      const sem = document.getElementById("semFilterCourse")?.value || 'Semester1';
      const yr = document.getElementById("yearFilterCourse")?.value || '2025/2026';
      if (document.getElementById("semFilter")) document.getElementById("semFilter").value = sem;
      if (document.getElementById("yearFilter")) document.getElementById("yearFilter").value = yr;
    }

    function selectCourseForGrades(id, name) {
      state.selectedCourseId = id; state.selectedCourseName = name; state.currentStep = 5; buildBreadcrumb();
      const sem = document.getElementById("semFilterCourse")?.value;
      const yr = document.getElementById("yearFilterCourse")?.value;
      state.selectedSemester = sem || 'Semester1';
      state.selectedAcademicYear = yr || '2025/2026';
      loadSubmittedGrades();
    }

    async function loadSubmittedGrades() {
      const el = document.getElementById("gradeContent");
      el.innerHTML = '<p style="color:var(--gray-300);text-align:center;padding:2rem"><i class="fa-solid fa-spinner fa-spin"></i> Loading submitted grades...</p>';
      try {
        const sem = (document.getElementById("semFilter")?.value) || state.selectedSemester || 'Semester1';
        const yr = (document.getElementById("yearFilter")?.value) || state.selectedAcademicYear || '2025/2026';
        state.selectedSemester = sem;
        state.selectedAcademicYear = yr;
        state.grades = await apiFetch(`/lecturers/submitted-grades?courseId=${state.selectedCourseId}&semester=${sem}&academicYear=${yr}`) || [];
        renderGradeList();
      } catch (ex) { el.innerHTML = `<p style="color:var(--error)">${esc(ex.message)}</p>`; }
    }

    function renderGradeList() {
      const el = document.getElementById("gradeContent");
      if (!state.grades.length) { el.innerHTML = '<div class="empty-state"><i class="fa-solid fa-database"></i><p>No submitted grades for this course.</p></div>'; return; }

      let html = `<div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:.5rem;margin-bottom:.75rem">
        <div class="step-title" style="margin:0"><i class="fa-solid fa-file-lines"></i>Submitted Grades — ${esc(state.selectedCourseName)}</div>
        <div style="font-size:.85rem;color:var(--gray-600)">${state.grades.length} grade${state.grades.length!==1?'s':''}</div>
      </div>
      <div class="filter-bar">
        <select id="semFilter" onchange="loadSubmittedGrades()"><option value="Semester1" ${state.selectedSemester==='Semester1'?'selected':''}>Semester One</option><option value="Semester2" ${state.selectedSemester==='Semester2'?'selected':''}>Semester Two</option></select>
        <select id="yearFilter" onchange="loadSubmittedGrades()"><option value="2024/2025" ${state.selectedAcademicYear==='2024/2025'?'selected':''}>2024/2025</option><option value="2025/2026" ${state.selectedAcademicYear==='2025/2026'?'selected':''}>2025/2026</option><option value="2026/2027" ${state.selectedAcademicYear==='2026/2027'?'selected':''}>2026/2027</option></select>
        <div class="export-bar">
          <button class="btn btn-outline btn-sm" onclick="exportGradeCsv()"><i class="fa-solid fa-file-excel"></i> Excel</button>
          <button class="btn btn-outline btn-sm" onclick="exportGradePdf()"><i class="fa-solid fa-file-pdf"></i> PDF</button>
          <button class="btn btn-outline btn-sm" onclick="window.print()"><i class="fa-solid fa-print"></i> Print</button>
        </div>
      </div>
      <div style="overflow-x:auto;border:1px solid var(--excel-border);border-radius:6px">
      <table class="excel-table"><thead><tr>
        <th>Student</th><th>Reg No</th><th>CA1</th><th>CA2</th><th>Asgn</th><th>Mid</th><th>Final</th><th>Total</th><th>Grade</th><th>Lecturer</th><th>Status</th><th>Actions</th>
      </tr></thead><tbody>`;
      state.grades.forEach(g => {
        const sCls = g.status === 'Finalized' ? 'badge-finalized' : g.status === 'Submitted' ? 'badge-submitted' : 'badge-draft';
        html += `<tr><td><strong>${esc(g.studentName)}</strong></td><td>${esc(g.registrationNumber||'-')}</td>
          <td>${g.ca1!=null?g.ca1:'-'}</td><td>${g.ca2!=null?g.ca2:'-'}</td><td>${g.assignment!=null?g.assignment:'-'}</td>
          <td>${g.midterm!=null?g.midterm:'-'}</td><td>${g.finalExam!=null?g.finalExam:'-'}</td>
          <td><strong>${g.total!=null?g.total:'-'}</strong></td>
          <td class="grade-${g.letterGrade||'F'}">${esc(g.letterGrade||'-')}</td>
          <td>${esc(g.submittedBy||'-')}</td>
          <td><span class="${sCls}">${esc(g.status||'Draft')}</span></td>
          <td>
            ${g.status !== 'Finalized' ? `<button class="btn btn-success btn-sm" onclick="approveGrade(${g.id})" title="Approve"><i class="fa-solid fa-check"></i></button>` : ''}
            ${g.status !== 'Finalized' ? `<button class="btn btn-danger btn-sm" onclick="rejectGrade(${g.id})" title="Reject"><i class="fa-solid fa-undo"></i></button>` : ''}
            <button class="btn btn-outline btn-sm" onclick="viewGradeSheet()" title="View All"><i class="fa-solid fa-eye"></i></button>
          </td>
        </tr>`;
      });
      html += '</tbody></table></div>';
      el.innerHTML = html;
    }

    async function approveGrade(id) { if(!confirm("Approve this grade? It will be locked."))return; try{await apiFetch(`/lecturers/grades/${id}/approve`,{method:'PUT',body:JSON.stringify({approvedBy:currentUser?.name||'Admin'})});SmartCampusUI.showToast("Grade approved","success");await loadSubmittedGrades();}catch(ex){SmartCampusUI.showToast("Failed: "+ex.message,"error");} }
    async function rejectGrade(id) { if(!confirm("Return this grade to lecturer for correction?"))return; try{await apiFetch(`/lecturers/grades/${id}/reject`,{method:'PUT',body:JSON.stringify({rejectedBy:currentUser?.name||'Admin'})});SmartCampusUI.showToast("Grade returned for correction","success");await loadSubmittedGrades();}catch(ex){SmartCampusUI.showToast("Failed: "+ex.message,"error");} }

    function viewGradeSheet() {
      document.getElementById("gradeModalTitle").textContent = `Grade Sheet — ${esc(state.selectedCourseName)}`;
      let html = '<div style="overflow-x:auto"><table class="excel-table"><thead><tr><th>Student</th><th>CA1</th><th>CA2</th><th>Asgn</th><th>Mid</th><th>Final</th><th>Total</th><th>Grade</th></tr></thead><tbody>';
      state.grades.forEach(g => {
        html += `<tr><td><strong>${esc(g.studentName)}</strong></td><td>${g.ca1!=null?g.ca1:'-'}</td><td>${g.ca2!=null?g.ca2:'-'}</td><td>${g.assignment!=null?g.assignment:'-'}</td><td>${g.midterm!=null?g.midterm:'-'}</td><td>${g.finalExam!=null?g.finalExam:'-'}</td><td><strong>${g.total!=null?g.total:'-'}</strong></td><td class="grade-${g.letterGrade||'F'}">${esc(g.letterGrade||'-')}</td></tr>`;
      });
      html += '</tbody></table></div>';
      document.getElementById("gradeModalBody").innerHTML = html;
      document.getElementById("gradeModal").classList.add("open");
    }

    function closeGradeModal() { document.getElementById("gradeModal").classList.remove("open"); }

    function exportGradeCsv() {
      const rows = [['Student','Reg No','CA1','CA2','Assignment','Midterm','Final Exam','Total','Grade','Lecturer','Status']];
      state.grades.forEach(g => rows.push([g.studentName||'',g.registrationNumber||'',g.ca1!=null?g.ca1:'',g.ca2!=null?g.ca2:'',g.assignment!=null?g.assignment:'',g.midterm!=null?g.midterm:'',g.finalExam!=null?g.finalExam:'',g.total!=null?g.total:'',g.letterGrade||'',g.submittedBy||'',g.status||'']));
      const csv = rows.map(r => r.map(c => '"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
      const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download = 'submitted_grades.csv'; a.click(); URL.revokeObjectURL(a.href);
      SmartCampusUI.showToast("CSV exported","success");
    }

    function exportGradePdf() {
      const rows = [['Student','Reg No','CA1','CA2','Assignment','Midterm','Final','Total','Grade','Status']];
      state.grades.forEach(g => rows.push([g.studentName||'',g.registrationNumber||'',g.ca1!=null?g.ca1:'',g.ca2!=null?g.ca2:'',g.assignment!=null?g.assignment:'',g.midterm!=null?g.midterm:'',g.finalExam!=null?g.finalExam:'',g.total!=null?g.total:'',g.letterGrade||'',g.status||'']));
      const csv = rows.map(r => r.map(c => '"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
      const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download = 'submitted_grades_pdf.csv'; a.click(); URL.revokeObjectURL(a.href);
      SmartCampusUI.showToast("Grade data exported","success");
    }

    function showError(msg) { document.getElementById("stepContent").innerHTML = `<p style="color:var(--error);text-align:center;padding:2rem">${esc(msg)}</p>`; }
  </script>
</body>
</html>
