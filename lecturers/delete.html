<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete Lecturer - SmartCampus</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root { --excel-header: #44546a; --excel-border: #d0d7de; }
    .breadcrumb { display: flex; flex-wrap: wrap; gap: .3rem .5rem; font-size: .85rem; padding: .6rem 0; }
    .breadcrumb a { color: var(--primary); text-decoration: none; }
    .breadcrumb span { color: var(--gray-500); }
    .breadcrumb .current { color: var(--gray-800); font-weight: 600; }
    .hierarchy-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
    .hierarchy-card { background: #fff; border: 1px solid var(--gray-200); border-radius: 10px; padding: 1.25rem; text-align: center; cursor: pointer; transition: all .2s; }
    .hierarchy-card:hover { border-color: var(--error); box-shadow: 0 2px 12px rgba(239,68,68,.1); transform: translateY(-2px); }
    .hierarchy-card .h-icon { font-size: 1.8rem; color: var(--error); margin-bottom: .5rem; }
    .hierarchy-card .h-name { font-weight: 600; font-size: .95rem; }
    .step-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; }
    .step-title i { margin-right: .4rem; color: var(--error); }
    .excel-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
    .excel-table th { background: var(--excel-header); color: #fff; padding: .55rem .4rem; text-align: left; font-weight: 600; white-space: nowrap; }
    .excel-table td { padding: .4rem; border: 1px solid var(--excel-border); }
    .excel-table tr:nth-child(even) { background: #f8f9fa; }
    .excel-table tr:hover { background: #fef2f2; }
    .action-bar { display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; margin: 1rem 0; }
    .empty-state { text-align: center; padding: 4rem 1rem; color: var(--gray-400); }
    .empty-state i { font-size: 3rem; margin-bottom: .75rem; }
    .delete-summary { padding: 1rem; background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; margin-bottom: 1rem; }
    .modal-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal { background:#fff;border-radius:12px;padding:2rem;max-width:480px;width:90%; }
    .toggle-group { display: flex; align-items: center; gap: .5rem; margin: .75rem 0; }
    .toggle-group input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    @media (max-width: 600px) { .hierarchy-grid { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
  <div id="sidebarMount"></div>
  <div class="main-content">
    <div class="top-bar"><button class="menu-toggle" type="button">☰</button><div class="role-selector"><label for="roleSelect">View as:</label><select id="roleSelect"></select></div></div>
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem">
      <h1 style="margin:0">Delete Lecturer</h1>
      <a href="../manage-lecturers.html" class="btn btn-outline btn-sm">&larr; Back</a>
    </div>
    <div class="breadcrumb" id="breadcrumb"><a href="../manage-lecturers.html">Manage Lecturers</a> <span>/</span> <span class="current">Delete Lecturer</span></div>
    <div id="stepContent"></div>
    <div id="deleteContent"></div>
    <div class="action-bar" id="actionBar" style="display:none">
      <div class="toggle-group">
        <input type="checkbox" id="softDeleteToggle" checked>
        <label for="softDeleteToggle" style="font-size:.82rem;cursor:pointer">Soft delete (move to Recycle Bin)</label>
      </div>
      <button class="btn btn-danger" onclick="confirmDeleteAll()"><i class="fa-solid fa-trash-can"></i> Delete All</button>
      <button class="btn btn-outline" onclick="confirmDeleteSelected()"><i class="fa-solid fa-check"></i> Delete Selected</button>
      <button class="btn btn-outline" onclick="confirmDeleteOne()"><i class="fa-solid fa-user-minus"></i> Delete One</button>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal">
      <h3 id="confirmModalTitle">Confirm Delete</h3>
      <p id="confirmModalMsg" style="font-size:.85rem;color:var(--gray-600)"></p>
      <div class="form-group" style="margin-bottom:.75rem">
        <label style="font-weight:600;font-size:.82rem">Reason / Audit Note (optional)</label>
        <textarea id="deleteReason" style="width:100%;padding:.5rem;border:1px solid var(--gray-200);border-radius:6px;min-height:60px;box-sizing:border-box;font-family:inherit"></textarea>
      </div>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap">
        <button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
        <button class="btn btn-outline" onclick="closeConfirmModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/render.js"></script>
  <script>
    const state = { schools:[],departments:[],programmes:[],lecturers:[],selectedSchoolId:null,selectedSchoolName:'',selectedDeptId:null,selectedDeptName:'',selectedProgId:null,selectedProgName:'',currentStep:0,selectedIds:new Set() };

    document.addEventListener("DOMContentLoaded", async () => {
      if (!["University Super Admin","School Super Admin","Department Admin"].includes(currentRole)) { document.querySelector(".main-content").innerHTML = '<div style="text-align:center;padding:4rem"><h2 style="color:var(--error)">Access Denied</h2></div>'; return; }
      await loadSchools();
    });

    function buildBreadcrumb() {
      const bc = document.getElementById("breadcrumb");
      let html = '<a href="../manage-lecturers.html">Manage Lecturers</a> <span>/</span> <a href="delete.html">Delete Lecturer</a>';
      if (state.selectedSchoolName) html += ` <span>/</span> <a href="#" onclick="event.preventDefault();resetTo(1)">${esc(state.selectedSchoolName)}</a>`;
      if (state.selectedDeptName) html += ` <span>/</span> <a href="#" onclick="event.preventDefault();resetTo(2)">${esc(state.selectedDeptName)}</a>`;
      if (state.selectedProgName) html += ` <span>/</span> <span class="current">${esc(state.selectedProgName)}</span>`;
      bc.innerHTML = html;
    }
    function resetTo(step) {
      if(step<=1){state.selectedSchoolId=null;state.selectedSchoolName='';}
      if(step<=2){state.selectedDeptId=null;state.selectedDeptName='';}
      if(step<=3){state.selectedProgId=null;state.selectedProgName='';}
      state.selectedIds.clear();state.currentStep=step;buildBreadcrumb();
      document.getElementById("deleteContent").innerHTML='';document.getElementById("actionBar").style.display='none';
      if(step===1)renderSchools();else if(step===2)renderDepts();else if(step===3)loadForDelete();
    }
    async function loadSchools(){try{state.schools=await SmartCampusAPI.fetchSchools()||[];state.currentStep=1;renderSchools();}catch(ex){showError(ex.message);}}
    function renderSchools(){let html='<div class="step-title"><i class="fa-solid fa-school"></i>Select a School</div><div class="hierarchy-grid">';state.schools.forEach(s=>{html+=`<div class="hierarchy-card" onclick="selectSchool('${s.id}','${esc(s.name)}')"><div class="h-icon"><i class="fa-solid fa-school"></i></div><div class="h-name">${esc(s.name)}</div></div>`;});html+='</div>';document.getElementById("stepContent").innerHTML=html;}
    async function selectSchool(id,name){state.selectedSchoolId=id;state.selectedSchoolName=name;try{state.departments=await SmartCampusAPI.fetchDepartments(id)||[];state.currentStep=2;buildBreadcrumb();renderDepts();}catch(ex){showError(ex.message);}}
    function renderDepts(){if(!state.departments.length){document.getElementById("stepContent").innerHTML='<div class="empty-state"><i class="fa-solid fa-building"></i><p>No departments.</p></div>';return;}let html='<div class="step-title"><i class="fa-solid fa-sitemap"></i>Select a Department</div><div class="hierarchy-grid">';state.departments.forEach(d=>{html+=`<div class="hierarchy-card" onclick="selectDept('${d.id}','${esc(d.name)}')"><div class="h-icon"><i class="fa-solid fa-building"></i></div><div class="h-name">${esc(d.name)}</div></div>`;});html+='</div>';document.getElementById("stepContent").innerHTML=html;}
    function selectDept(id,name){state.selectedDeptId=id;state.selectedDeptName=name;loadProgs(id);}
    async function loadProgs(deptId){try{state.programmes=await SmartCampusAPI.fetchProgrammes(deptId)||[];state.currentStep=3;buildBreadcrumb();renderProgs();}catch(ex){showError(ex.message);}}
    function renderProgs(){if(!state.programmes.length){document.getElementById("stepContent").innerHTML='<div class="empty-state"><i class="fa-solid fa-graduation-cap"></i><p>No programmes.</p></div>';return;}let html='<div class="step-title"><i class="fa-solid fa-graduation-cap"></i>Select a Programme</div><div class="hierarchy-grid">';state.programmes.forEach(p=>{html+=`<div class="hierarchy-card" onclick="selectProg('${p.id}','${esc(p.name)}')"><div class="h-icon"><i class="fa-solid fa-book-open"></i></div><div class="h-name">${esc(p.name)}</div></div>`;});html+='</div>';document.getElementById("stepContent").innerHTML=html;}
    async function selectProg(id,name){state.selectedProgId=id;state.selectedProgName=name;state.currentStep=4;buildBreadcrumb();const el=document.getElementById("stepContent");el.innerHTML='<p style="color:var(--gray-300);text-align:center;padding:2rem"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</p>';try{state.lecturers=await apiFetch(`/lecturers?programmeId=${id}`)||[];renderDeleteSheet();}catch(ex){showError(ex.message);}}

    function renderDeleteSheet() {
      const el = document.getElementById("deleteContent");
      const ab = document.getElementById("actionBar");
      if (!state.lecturers.length) { el.innerHTML = '<div class="empty-state"><i class="fa-solid fa-chalkboard-user"></i><p>No lecturers.</p></div>'; ab.style.display = 'none'; return; }
      ab.style.display = 'flex';
      state.selectedIds.clear();
      let html = `<div class="delete-summary"><strong>${state.lecturers.length}</strong> lecturer${state.lecturers.length!==1?'s':''} in <strong>${esc(state.selectedProgName)}</strong></div>`;
      html += '<div style="overflow-x:auto;border:1px solid var(--excel-border);border-radius:6px"><table class="excel-table"><thead><tr><th><input type="checkbox" onchange="toggleAll(this.checked)"></th><th>ID</th><th>Name</th><th>Email</th><th>Status</th></tr></thead><tbody>';
      state.lecturers.forEach(l => {
        html += `<tr><td><input type="checkbox" class="lec-cb" value="${l.id}" onchange="toggleOne(${l.id},this.checked)"></td><td>${esc(l.lecturerId||'-')}</td><td><strong>${esc(l.name)}</strong></td><td>${esc(l.email)}</td><td>${l.status||'Active'}</td></tr>`;
      });
      html += '</tbody></table></div>';
      el.innerHTML = html;
    }
    function toggleOne(id,chk){if(chk)state.selectedIds.add(id);else state.selectedIds.delete(id);}
    function toggleAll(chk){state.lecturers.forEach(l=>{if(chk)state.selectedIds.add(l.id);else state.selectedIds.delete(l.id);});document.querySelectorAll(".lec-cb").forEach(cb=>cb.checked=chk);}

    async function deleteAll(){if(!confirm(`Delete ALL ${state.lecturers.length} lecturers in ${state.selectedProgName}? This cannot be undone.`))return;try{const ids=state.lecturers.map(l=>l.id);await apiFetch('/lecturers/bulk-delete',{method:'POST',body:JSON.stringify(ids)});SmartCampusUI.showToast(`${ids.length} lecturers deleted`,"success");state.lecturers=[];renderDeleteSheet();}catch(ex){SmartCampusUI.showToast("Failed: "+ex.message,"error");}}
    async function deleteSelected(){const ids=[...state.selectedIds];if(!ids.length){SmartCampusUI.showToast("No lecturers selected","error");return;}if(!confirm(`Delete ${ids.length} selected lecturer${ids.length!==1?'s':''}?`))return;try{await apiFetch('/lecturers/bulk-delete',{method:'POST',body:JSON.stringify(ids)});SmartCampusUI.showToast(`${ids.length} deleted`,"success");state.lecturers=state.lecturers.filter(l=>!ids.includes(l.id));renderDeleteSheet();}catch(ex){SmartCampusUI.showToast("Failed: "+ex.message,"error");}}
    async function deleteOne(){const ids=[...state.selectedIds];if(ids.length!==1){SmartCampusUI.showToast("Select exactly one lecturer","error");return;}if(!confirm(`Delete this lecturer?`))return;try{await apiFetch(`/lecturers/${ids[0]}`,{method:'DELETE'});SmartCampusUI.showToast("Lecturer deleted","success");state.lecturers=state.lecturers.filter(l=>l.id!==ids[0]);renderDeleteSheet();}catch(ex){SmartCampusUI.showToast("Failed: "+ex.message,"error");}}

    function showError(msg){document.getElementById("stepContent").innerHTML=`<p style="color:var(--error);text-align:center;padding:2rem">${esc(msg)}</p>`;}

    function showConfirmModal(title, msg, action) {
      document.getElementById("confirmModalTitle").textContent = title;
      document.getElementById("confirmModalMsg").textContent = msg;
      document.getElementById("confirmDeleteBtn").onclick = async () => {
        const reason = document.getElementById("deleteReason").value.trim() || 'No reason provided';
        const softDelete = document.getElementById("softDeleteToggle").checked;
        document.getElementById("confirmDeleteBtn").disabled = true;
        document.getElementById("confirmDeleteBtn").textContent = 'Deleting...';
        try { await action(reason, softDelete); closeConfirmModal(); }
        catch (ex) { SmartCampusUI.showToast("Failed: "+ex.message,"error"); }
        document.getElementById("confirmDeleteBtn").disabled = false;
        document.getElementById("confirmDeleteBtn").textContent = 'Delete';
      };
      document.getElementById("confirmModal").classList.add("open");
    }
    function closeConfirmModal() {
      document.getElementById("confirmModal").classList.remove("open");
      document.getElementById("deleteReason").value = '';
      document.getElementById("confirmDeleteBtn").disabled = false;
      document.getElementById("confirmDeleteBtn").textContent = 'Delete';
    }

    function confirmDeleteAll() {
      const n = state.lecturers.length;
      showConfirmModal(
        `Delete All ${n} Lecturers`,
        `This will permanently or soft-delete all ${n} lecturers in "${state.selectedProgName}".`,
        async (reason, softDelete) => {
          const ids = state.lecturers.map(l => l.id);
          await apiFetch('/lecturers/bulk-delete', { method: 'POST', body: JSON.stringify({ ids, reason, softDelete, deletedBy: currentUser?.name || 'Admin' }) });
          SmartCampusUI.showToast(`${ids.length} lecturer${ids.length!==1?'s':''} ${softDelete?'soft-deleted':'permanently deleted'}`, "success");
          state.lecturers = []; renderDeleteSheet();
        }
      );
    }

    function confirmDeleteSelected() {
      const ids = [...state.selectedIds];
      if (!ids.length) { SmartCampusUI.showToast("No lecturers selected", "error"); return; }
      showConfirmModal(
        `Delete ${ids.length} Selected`,
        `Delete ${ids.length} selected lecturer${ids.length!==1?'s':''}?`,
        async (reason, softDelete) => {
          await apiFetch('/lecturers/bulk-delete', { method: 'POST', body: JSON.stringify({ ids, reason, softDelete, deletedBy: currentUser?.name || 'Admin' }) });
          SmartCampusUI.showToast(`${ids.length} ${softDelete?'soft-deleted':'deleted'}`, "success");
          state.lecturers = state.lecturers.filter(l => !ids.includes(l.id)); renderDeleteSheet();
        }
      );
    }

    function confirmDeleteOne() {
      const ids = [...state.selectedIds];
      if (ids.length !== 1) { SmartCampusUI.showToast("Select exactly one lecturer", "error"); return; }
      const l = state.lecturers.find(x => x.id === ids[0]);
      showConfirmModal(
        `Delete ${esc(l?.name||'Lecturer')}`,
        `Delete ${esc(l?.name||'this lecturer')}?`,
        async (reason, softDelete) => {
          await apiFetch(`/lecturers/${ids[0]}`, { method: 'DELETE', body: JSON.stringify({ reason, softDelete, deletedBy: currentUser?.name || 'Admin' }) });
          SmartCampusUI.showToast(`Lecturer ${softDelete?'soft-deleted':'deleted'}`, "success");
          state.lecturers = state.lecturers.filter(x => x.id !== ids[0]); renderDeleteSheet();
        }
      );
    }
  </script>
</body>
</html>
