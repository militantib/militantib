<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete Students - SmartCampus</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .breadcrumb { display: flex; flex-wrap: wrap; gap: .3rem .5rem; align-items: center; font-size: .85rem; padding: .6rem 0; margin-bottom: .5rem; }
    .breadcrumb a { color: var(--primary); text-decoration: none; }
    .breadcrumb span { color: var(--gray-500); }
    .breadcrumb .current { color: var(--gray-800); font-weight: 600; }
    .step-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; }
    .step-title i { margin-right: .4rem; color: var(--error); }
    .hierarchy-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
    .hierarchy-card { background: #fff; border: 1px solid var(--gray-200); border-radius: 10px; padding: 1.25rem; text-align: center; cursor: pointer; transition: all .2s; }
    .hierarchy-card:hover { border-color: var(--error); box-shadow: 0 2px 12px rgba(0,0,0,.08); transform: translateY(-2px); }
    .hierarchy-card .h-icon { font-size: 1.8rem; color: var(--error); margin-bottom: .5rem; }
    .hierarchy-card .h-name { font-weight: 600; font-size: .95rem; }
    .hierarchy-card .h-count { font-size: .75rem; color: var(--gray-500); margin-top: .25rem; }
    .year-grid { display: flex; gap: 1rem; flex-wrap: wrap; }
    .year-btn { padding: 1rem 2rem; border: 1px solid var(--gray-200); border-radius: 10px; background: #fff; cursor: pointer; font-weight: 600; transition: all .2s; min-width: 140px; text-align: center; }
    .year-btn:hover { border-color: var(--error); background: #fff0f0; }
    .year-btn .y-icon { font-size: 1.4rem; display: block; margin-bottom: .3rem; color: var(--error); }
    .delete-list { display: flex; flex-direction: column; gap: .5rem; max-width: 600px; }
    .delete-item { display: flex; align-items: center; gap: .75rem; padding: .6rem .75rem; background: #fff; border: 1px solid var(--gray-200); border-radius: 8px; transition: background .15s; }
    .delete-item:hover { background: var(--gray-50); }
    .delete-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    .delete-item label { cursor: pointer; flex: 1; font-size: .9rem; }
    .delete-item .info { font-size: .75rem; color: var(--gray-500); }
    .bulk-actions { display: flex; gap: .5rem; flex-wrap: wrap; margin: 1rem 0; padding: 1rem; background: var(--gray-50); border-radius: 8px; align-items: center; }
    .bulk-actions .selected-count { font-size: .85rem; color: var(--gray-600); margin-right: .5rem; }
    .empty-hierarchy { text-align: center; padding: 4rem 1rem; color: var(--gray-400); }
    .empty-hierarchy i { font-size: 3rem; margin-bottom: .75rem; }
    @media (max-width: 600px) { .hierarchy-grid { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
  <div id="sidebarMount"></div>
  <div class="main-content">
    <div class="top-bar"><button class="menu-toggle" type="button">☰</button><div class="role-selector"><label for="roleSelect">View as:</label><select id="roleSelect"></select></div></div>

    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem">
      <h1 style="margin:0">Delete Students</h1>
      <a href="../manage-students.html" class="btn btn-outline btn-sm">&larr; Back to Dashboard</a>
    </div>
    <p style="color:var(--gray-600);margin:.5rem 0 0">Browse the hierarchy and select students to delete.</p>

    <div class="breadcrumb" id="breadcrumb"><a href="../manage-students.html">Student Management</a> <span>/</span> <span class="current">Delete Students</span></div>

    <div id="stepContent"></div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/render.js"></script>
  <script>
    let state = {
      schools: [], departments: [], programmes: [], students: [],
      selectedSchoolId: null, selectedSchoolName: '',
      selectedDeptId: null, selectedDeptName: '',
      selectedProgId: null, selectedProgName: '',
      selectedYear: '',
      currentStep: 0,
      selectedIds: new Set()
    };

    document.addEventListener("DOMContentLoaded", async () => {
      if (!["University Super Admin", "School Super Admin"].includes(currentRole)) {
        document.querySelector(".main-content").innerHTML = '<div style="text-align:center;padding:4rem"><h2 style="color:var(--error)">Access Denied</h2><p>Only University Super Admin and School Super Admin can manage students.</p><a href="../dashboard.html" class="btn btn-primary">Go to Dashboard</a></div>';
        return;
      }
      await loadSchools();
    });

    function buildBreadcrumb() {
      const bc = document.getElementById("breadcrumb");
      let html = '<a href="../manage-students.html">Student Management</a> <span>/</span> <a href="../students/delete.html">Delete Students</a>';
      if (state.selectedSchoolName) html += ` <span>/</span> <a href="#" onclick="event.preventDefault();resetTo(1)">${esc(state.selectedSchoolName)}</a>`;
      if (state.selectedDeptName) html += ` <span>/</span> <a href="#" onclick="event.preventDefault();resetTo(2)">${esc(state.selectedDeptName)}</a>`;
      if (state.selectedProgName) html += ` <span>/</span> <a href="#" onclick="event.preventDefault();resetTo(3)">${esc(state.selectedProgName)}</a>`;
      if (state.selectedYear) html += ` <span>/</span> <span class="current">${esc(state.selectedYear)}</span>`;
      bc.innerHTML = html;
    }

    function resetTo(step) {
      if (step <= 1) { state.selectedSchoolId = null; state.selectedSchoolName = ''; }
      if (step <= 2) { state.selectedDeptId = null; state.selectedDeptName = ''; }
      if (step <= 3) { state.selectedProgId = null; state.selectedProgName = ''; }
      if (step <= 4) state.selectedYear = '';
      state.currentStep = step;
      state.selectedIds = new Set();
      buildBreadcrumb();
      if (step === 1) renderSchools();
      else if (step === 2) renderDepartments();
      else if (step === 3) renderProgrammes();
      else if (step === 4) renderYears();
    }

    // Schools
    async function loadSchools() {
      try {
        state.schools = await SmartCampusAPI.fetchSchools() || [];
        state.currentStep = 1;
        renderSchools();
      } catch (ex) { showError("Failed to load schools: " + ex.message); }
    }

    function renderSchools() {
      const el = document.getElementById("stepContent");
      let html = '<div class="step-title"><i class="fa-solid fa-school"></i>Select a School</div><div class="hierarchy-grid">';
      state.schools.forEach(s => {
        html += `<div class="hierarchy-card" onclick="selectSchool('${s.id}','${esc(s.name)}')">
          <div class="h-icon"><i class="fa-solid fa-school"></i></div>
          <div class="h-name">${esc(s.name)}</div>
        </div>`;
      });
      html += '</div>';
      el.innerHTML = html;
    }

    async function selectSchool(id, name) {
      state.selectedSchoolId = id; state.selectedSchoolName = name;
      try {
        state.departments = await SmartCampusAPI.fetchDepartments(id) || [];
        state.currentStep = 2;
        buildBreadcrumb();
        renderDepartments();
      } catch (ex) { showError("Failed to load departments: " + ex.message); }
    }

    // Departments
    function renderDepartments() {
      const el = document.getElementById("stepContent");
      if (!state.departments.length) {
        el.innerHTML = '<div class="empty-hierarchy"><i class="fa-solid fa-building"></i><p>No departments found.</p></div>'; return;
      }
      let html = '<div class="step-title"><i class="fa-solid fa-sitemap"></i>Select a Department</div><div class="hierarchy-grid">';
      state.departments.forEach(d => {
        html += `<div class="hierarchy-card" onclick="selectDept('${d.id}','${esc(d.name)}')">
          <div class="h-icon"><i class="fa-solid fa-building"></i></div>
          <div class="h-name">${esc(d.name)}</div>
        </div>`;
      });
      html += '</div>';
      el.innerHTML = html;
    }

    function selectDept(id, name) {
      state.selectedDeptId = id; state.selectedDeptName = name;
      loadProgrammes(id);
    }

    // Programmes
    async function loadProgrammes(deptId) {
      try {
        state.programmes = await SmartCampusAPI.fetchProgrammes(deptId) || [];
        state.currentStep = 3;
        buildBreadcrumb();
        renderProgrammes();
      } catch (ex) { showError("Failed to load programmes: " + ex.message); }
    }

    function renderProgrammes() {
      const el = document.getElementById("stepContent");
      if (!state.programmes.length) {
        el.innerHTML = '<div class="empty-hierarchy"><i class="fa-solid fa-graduation-cap"></i><p>No programmes found.</p></div>'; return;
      }
      let html = '<div class="step-title"><i class="fa-solid fa-graduation-cap"></i>Select a Programme</div><div class="hierarchy-grid">';
      state.programmes.forEach(p => {
        html += `<div class="hierarchy-card" onclick="selectProg('${p.id}','${esc(p.name)}')">
          <div class="h-icon"><i class="fa-solid fa-book-open"></i></div>
          <div class="h-name">${esc(p.name)}</div>
        </div>`;
      });
      html += '</div>';
      el.innerHTML = html;
    }

    function selectProg(id, name) {
      state.selectedProgId = id; state.selectedProgName = name;
      state.currentStep = 4;
      buildBreadcrumb();
      renderYears();
    }

    // Years
    function renderYears() {
      const el = document.getElementById("stepContent");
      const years = ["Year 1", "Year 2", "Year 3", "Year 4"];
      let html = '<div class="step-title"><i class="fa-solid fa-layer-group"></i>Select Year / Level</div><div class="year-grid">';
      years.forEach(y => {
        html += `<div class="year-btn" onclick="selectYear('${y}')">
          <span class="y-icon"><i class="fa-solid fa-layer-group"></i></span>${y}
        </div>`;
      });
      html += '</div>';
      el.innerHTML = html;
    }

    function selectYear(year) {
      state.selectedYear = year;
      state.currentStep = 5;
      state.selectedIds = new Set();
      buildBreadcrumb();
      loadStudentsForDelete();
    }

    // Student list with checkboxes
    async function loadStudentsForDelete() {
      const el = document.getElementById("stepContent");
      el.innerHTML = '<p style="color:var(--gray-300);text-align:center;padding:2rem"><i class="fa-solid fa-spinner fa-spin"></i> Loading students...</p>';
      try {
        state.students = await SmartCampusAPI.fetchStudents(
          state.selectedSchoolId, state.selectedDeptId, state.selectedProgId, state.selectedYear
        ) || [];
        renderDeleteList();
      } catch (ex) { showError("Failed to load students: " + ex.message); }
    }

    function renderDeleteList() {
      const el = document.getElementById("stepContent");
      if (!state.students.length) {
        el.innerHTML = '<div class="empty-hierarchy"><i class="fa-solid fa-users"></i><p>No students found in this level.</p></div>';
        return;
      }

      const selName = state.selectedProgName || state.selectedDeptName || state.selectedSchoolName || '';
      let html = `<div class="step-title"><i class="fa-solid fa-users"></i>Students in ${esc(selName)} — ${esc(state.selectedYear)}</div>`;

      // Bulk actions bar
      html += `<div class="bulk-actions">
        <span class="selected-count" id="selectedCount">${state.selectedIds.size} selected</span>
        <button class="btn btn-outline btn-sm" onclick="selectAll()">Select All</button>
        <button class="btn btn-outline btn-sm" onclick="deselectAll()">Deselect All</button>
        <button class="btn btn-primary btn-sm" onclick="deleteSelected()" id="deleteSelectedBtn" ${state.selectedIds.size===0?'disabled':''} style="${state.selectedIds.size===0?'opacity:.5':''}">
          <i class="fa-solid fa-trash-can"></i> Delete Selected (${state.selectedIds.size})
        </button>
        <button class="btn btn-outline btn-sm" onclick="deleteAllInLevel()" style="color:var(--error)">Delete All in ${esc(state.selectedYear)}</button>
        <button class="btn btn-outline btn-sm" onclick="deleteAllInProgramme()" style="color:var(--error)">Delete All in Programme</button>
        <button class="btn btn-outline btn-sm" onclick="deleteAllInDepartment()" style="color:var(--error)">Delete All in Department</button>
        <button class="btn btn-outline btn-sm" onclick="deleteAllInSchool()" style="color:var(--error)">Delete All in School</button>
      </div>`;

      html += '<div class="delete-list">';
      state.students.forEach(s => {
        const checked = state.selectedIds.has(String(s.id)) ? 'checked' : '';
        html += `<div class="delete-item">
          <input type="checkbox" id="stu_${s.id}" ${checked} onchange="toggleStudent('${s.id}')">
          <label for="stu_${s.id}">
            <strong>${esc(s.name)}</strong>
            <span class="info"> — ${esc(s.email)} ${s.registrationNumber ? '| '+esc(s.registrationNumber) : ''}</span>
          </label>
        </div>`;
      });
      html += '</div>';
      el.innerHTML = html;
    }

    function toggleStudent(id) {
      if (state.selectedIds.has(String(id))) state.selectedIds.delete(String(id));
      else state.selectedIds.add(String(id));
      updateDeleteUI();
    }

    function selectAll() {
      state.students.forEach(s => state.selectedIds.add(String(s.id)));
      updateDeleteUI();
    }

    function deselectAll() {
      state.selectedIds = new Set();
      updateDeleteUI();
    }

    function updateDeleteUI() {
      const countEl = document.getElementById("selectedCount");
      const btn = document.getElementById("deleteSelectedBtn");
      if (countEl) countEl.textContent = `${state.selectedIds.size} selected`;
      if (btn) {
        btn.textContent = `Delete Selected (${state.selectedIds.size})`;
        btn.disabled = state.selectedIds.size === 0;
        btn.style.opacity = state.selectedIds.size === 0 ? '.5' : '1';
      }
      // Re-render checkboxes
      state.students.forEach(s => {
        const cb = document.getElementById(`stu_${s.id}`);
        if (cb) cb.checked = state.selectedIds.has(String(s.id));
      });
    }

    async function deleteSelected() {
      if (state.selectedIds.size === 0) return;
      if (!await confirmModal(`Delete ${state.selectedIds.size} selected student(s)? This action cannot be undone.`)) return;
      const ids = [...state.selectedIds];
      let success = 0, failed = 0;
      for (const id of ids) {
        try {
          await SmartCampusAPI.deleteUser(id);
          success++;
        } catch { failed++; }
      }
      SmartCampusUI.showToast(`${success} deleted${failed ? ', '+failed+' failed' : ''}`, failed ? 'error' : 'success');
      state.selectedIds = new Set();
      await loadStudentsForDelete();
    }

    async function deleteAllInLevel() {
      if (!await confirmModal(`Delete ALL students in ${state.selectedYear}? This cannot be undone.`)) return;
      let success = 0, failed = 0;
      for (const s of state.students) {
        try { await SmartCampusAPI.deleteUser(s.id); success++; } catch { failed++; }
      }
      SmartCampusUI.showToast(`${success} deleted${failed ? ', '+failed+' failed' : ''}`, failed ? 'error' : 'success');
      await loadStudentsForDelete();
    }

    async function deleteAllInProgramme() {
      if (!await confirmModal(`Delete ALL students in programme "${state.selectedProgName}"? This cannot be undone.`)) return;
      try {
        const all = await SmartCampusAPI.fetchStudents(state.selectedSchoolId, state.selectedDeptId, state.selectedProgId) || [];
        let success = 0, failed = 0;
        for (const s of all) {
          try { await SmartCampusAPI.deleteUser(s.id); success++; } catch { failed++; }
        }
        SmartCampusUI.showToast(`${success} deleted${failed ? ', '+failed+' failed' : ''}`, failed ? 'error' : 'success');
      } catch (ex) { SmartCampusUI.showToast("Error: " + ex.message, "error"); }
      await loadStudentsForDelete();
    }

    async function deleteAllInDepartment() {
      if (!await confirmModal(`Delete ALL students in department "${state.selectedDeptName}"? This cannot be undone.`)) return;
      try {
        const all = await SmartCampusAPI.fetchStudents(state.selectedSchoolId, state.selectedDeptId) || [];
        let success = 0, failed = 0;
        for (const s of all) {
          try { await SmartCampusAPI.deleteUser(s.id); success++; } catch { failed++; }
        }
        SmartCampusUI.showToast(`${success} deleted${failed ? ', '+failed+' failed' : ''}`, failed ? 'error' : 'success');
      } catch (ex) { SmartCampusUI.showToast("Error: " + ex.message, "error"); }
      await loadStudentsForDelete();
    }

    async function deleteAllInSchool() {
      if (!await confirmModal(`Delete ALL students in school "${state.selectedSchoolName}"? This cannot be undone.`)) return;
      try {
        const all = await SmartCampusAPI.fetchStudents(state.selectedSchoolId) || [];
        let success = 0, failed = 0;
        for (const s of all) {
          try { await SmartCampusAPI.deleteUser(s.id); success++; } catch { failed++; }
        }
        SmartCampusUI.showToast(`${success} deleted${failed ? ', '+failed+' failed' : ''}`, failed ? 'error' : 'success');
      } catch (ex) { SmartCampusUI.showToast("Error: " + ex.message, "error"); }
      await loadStudentsForDelete();
    }

    function showError(msg) {
      document.getElementById("stepContent").innerHTML = `<p style="color:var(--error);text-align:center;padding:2rem">${esc(msg)}</p>`;
    }

    function confirmModal(msg) {
      return new Promise(resolve => {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.style.cssText = 'display:flex;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9999;align-items:center;justify-content:center';
        overlay.innerHTML = `
          <div class="modal" style="max-width:420px;text-align:center;padding:2rem">
            <i class="fa-solid fa-triangle-exclamation" style="font-size:2.5rem;color:var(--error);margin-bottom:1rem"></i>
            <p style="margin-bottom:1.5rem;font-size:.95rem">${esc(msg)}</p>
            <div style="display:flex;gap:.5rem;justify-content:center">
              <button class="btn btn-error btn-sm" id="confirmYes">Yes, Delete</button>
              <button class="btn btn-outline btn-sm" id="confirmNo">Cancel</button>
            </div>
          </div>`;
        document.body.appendChild(overlay);
        document.getElementById('confirmYes').onclick = () => { document.body.removeChild(overlay); resolve(true); };
        document.getElementById('confirmNo').onclick = () => { document.body.removeChild(overlay); resolve(false); };
        overlay.addEventListener('click', e => { if (e.target === overlay) { document.body.removeChild(overlay); resolve(false); } });
      });
    }
  </script>
</body>
</html>
