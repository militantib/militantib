<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fee Management - SmartCampus</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .fee-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .fee-stat { text-align: center; padding: 1rem; background: var(--gray-100); border-radius: 8px; }
    .fee-stat h3 { font-size: 1.5rem; margin-bottom: .25rem; }
    .fee-stat p { font-size: .8rem; color: var(--gray-700); }
    .pay-form { display: flex; gap: .75rem; flex-wrap: wrap; align-items: end; }
    .pay-form label { font-weight: 600; font-size: .85rem; display: block; margin-bottom: .25rem; }
    .pay-form input, .pay-form select { padding: .5rem; border: 1px solid var(--gray-200); border-radius: 6px; }
  </style>
</head>
<body>
  <div id="sidebarMount"></div>
  <div class="main-content">
    <div class="top-bar"><button class="menu-toggle" type="button">☰</button><div class="role-selector"><label for="roleSelect">View as:</label><select id="roleSelect"></select></div></div>
    <h1>Fee Management</h1>
    <div class="fee-summary" id="feeSummary"></div>
    <div class="card">
      <h3>Fee Records</h3>
      <div class="table-responsive" id="feeRecordsContainer"></div>
    </div>
    <div class="card">
      <h3>Make Payment</h3>
      <form class="pay-form" id="payForm">
        <div><label>Amount (NLE)</label><input type="number" id="payAmount" value="50000" required></div>
        <div><label>Method</label><select id="payMethod"><option>Bank Transfer</option><option>Cash</option><option>Mobile Money</option><option>Cheque</option></select></div>
        <div><label>Reference</label><input id="payRef" placeholder="e.g. TXN-003"></div>
        <button type="submit" class="btn btn-primary">Pay</button>
      </form>
    </div>
    <div class="card">
      <h3>Payment History</h3>
      <div class="table-responsive" id="paymentHistoryContainer"></div>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/api.js"></script>
  <script src="js/render.js"></script>
</body>
</html>
