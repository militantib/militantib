<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password - Njala University SmartCampus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy: #0A192F; --navy-light: #112240; --gold: #C9A84C;
      --white: #FFFFFF; --gray-50: #F8FAFC; --gray-100: #F1F5F9;
      --gray-200: #E2E8F0; --gray-300: #CBD5E1; --gray-400: #94A3B8;
      --gray-500: #64748B; --gray-600: #475569; --gray-700: #334155;
      --gray-900: #0F172A; --success: #10B981; --error: #EF4444;
      --info: #3B82F6; --radius: 12px; --transition: all 0.2s ease;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem;
    }
    .card { max-width: 440px; width: 100%; background: var(--white); border-radius: var(--radius); box-shadow: 0 8px 40px rgba(0,0,0,.12); overflow: hidden; }
    .header { background: var(--navy); padding: 2rem; text-align: center; }
    .header .icon-circle { width: 56px; height: 56px; border-radius: 50%; background: rgba(255,255,255,.1); display: flex; align-items: center; justify-content: center; margin: 0 auto 0.75rem; font-size: 1.4rem; color: var(--gold); }
    .header h1 { color: var(--white); font-size: 1.2rem; font-weight: 700; }
    .header p { color: var(--gray-400); font-size: 0.85rem; margin-top: 0.25rem; }
    .body { padding: 2rem; }
    .notice { background: #FFFBEB; border: 1px solid #FDE68A; border-radius: 8px; padding: 0.75rem; margin-bottom: 1.5rem; font-size: 0.82rem; color: #92400E; display: flex; gap: 0.5rem; align-items: flex-start; }
    .notice i { flex-shrink: 0; margin-top: 2px; }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--gray-700); margin-bottom: 0.35rem; }
    .input-wrapper { position: relative; display: flex; align-items: center; }
    .input-wrapper .icon { position: absolute; left: 12px; color: var(--gray-400); pointer-events: none; }
    .input-wrapper input { width: 100%; padding: 0.75rem 0.75rem 0.75rem 2.5rem; border: 1.5px solid var(--gray-200); border-radius: 8px; font-size: 0.9rem; font-family: inherit; transition: var(--transition); background: var(--gray-50); }
    .input-wrapper input:focus { outline: none; border-color: var(--navy); box-shadow: 0 0 0 3px rgba(10,25,47,.08); }
    .input-wrapper .toggle { position: absolute; right: 12px; background: none; border: none; color: var(--gray-400); cursor: pointer; padding: 4px; }
    .input-wrapper .toggle:hover { color: var(--gray-600); }
    .btn { width: 100%; padding: 0.8rem; background: var(--navy); color: var(--white); border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: var(--transition); font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .btn:hover { background: var(--navy-light); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg { display: none; background: #FEF2F2; color: var(--error); font-size: 0.85rem; padding: 0.65rem 0.85rem; border-radius: 8px; margin-bottom: 1rem; text-align: center; border: 1px solid #FECACA; }
    .error-msg.visible { display: block; }
    .success-msg { display: none; background: #F0FDF4; color: #166534; font-size: 0.85rem; padding: 0.65rem 0.85rem; border-radius: 8px; margin-bottom: 1rem; text-align: center; border: 1px solid #BBF7D0; }
    .success-msg.visible { display: block; }
    .spinner { display: none; }
    .btn.loading .spinner { display: inline-block; animation: spin 0.8s linear infinite; }
    .btn.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .strength { height: 4px; border-radius: 2px; margin-top: 6px; background: var(--gray-200); overflow: hidden; }
    .strength-bar { height: 100%; width: 0%; border-radius: 2px; transition: width 0.3s ease, background 0.3s ease; }
    .requirements { font-size: 0.75rem; color: var(--gray-500); margin-top: 0.35rem; display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .requirements span { display: flex; align-items: center; gap: 0.25rem; }
    .requirements .ok { color: var(--success); }
    .requirements .no { color: var(--gray-400); }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="icon-circle"><i class="fas fa-key"></i></div>
      <h1>Change Your Password</h1>
      <p>Secure your account with a new password</p>
    </div>
    <div class="body">
      <div class="notice">
        <i class="fas fa-exclamation-triangle"></i>
        <span>You are required to change your password before continuing. This is a security requirement for first-time login.</span>
      </div>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <form id="changePwForm">
        <div class="form-group">
          <label for="currentPassword">Current Password</label>
          <div class="input-wrapper">
            <i class="fas fa-unlock icon"></i>
            <input type="password" id="currentPassword" placeholder="Enter your current password" required>
            <button type="button" class="toggle" id="toggleCurrent" tabindex="-1"><i class="fas fa-eye"></i></button>
          </div>
        </div>
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock icon"></i>
            <input type="password" id="newPassword" placeholder="At least 8 characters" required minlength="8">
            <button type="button" class="toggle" id="toggleNew" tabindex="-1"><i class="fas fa-eye"></i></button>
          </div>
          <div class="strength"><div class="strength-bar" id="strengthBar"></div></div>
          <div class="requirements" id="requirements">
            <span id="reqUpper" class="no"><i class="fas fa-times-circle"></i> Uppercase</span>
            <span id="reqLower" class="no"><i class="fas fa-times-circle"></i> Lowercase</span>
            <span id="reqDigit" class="no"><i class="fas fa-times-circle"></i> Digit</span>
            <span id="reqSpecial" class="no"><i class="fas fa-times-circle"></i> Special</span>
            <span id="reqLength" class="no"><i class="fas fa-times-circle"></i> 8+ chars</span>
          </div>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm New Password</label>
          <div class="input-wrapper">
            <i class="fas fa-check-circle icon"></i>
            <input type="password" id="confirmPassword" placeholder="Re-enter new password" required minlength="8">
            <button type="button" class="toggle" id="toggleConfirm" tabindex="-1"><i class="fas fa-eye"></i></button>
          </div>
        </div>
        <button type="submit" class="btn" id="submitBtn">
          <i class="fas fa-save"></i>
          <span class="btn-text">Change Password</span>
          <span class="spinner"><i class="fas fa-spinner"></i></span>
        </button>
      </form>

      <a href="login.html" class="back-link" style="display:block;text-align:center;margin-top:1rem;font-size:0.85rem;color:var(--info);text-decoration:none;">
        <i class="fas fa-arrow-left"></i> Back to Login
      </a>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    (function() {
      // Check token exists
      const token = localStorage.getItem('sc_token');
      if (!token) {
        window.location.href = 'login.html';
        return;
      }

      const form = document.getElementById('changePwForm');
      const curPw = document.getElementById('currentPassword');
      const newPw = document.getElementById('newPassword');
      const conPw = document.getElementById('confirmPassword');
      const errorEl = document.getElementById('errorMsg');
      const successEl = document.getElementById('successMsg');
      const submitBtn = document.getElementById('submitBtn');
      const strengthBar = document.getElementById('strengthBar');

      // Toggle visibility
      function makeToggle(btnId, inputId) {
        document.getElementById(btnId).addEventListener('click', () => {
          const inp = document.getElementById(inputId);
          const t = inp.type === 'password' ? 'text' : 'password';
          inp.type = t;
          document.getElementById(btnId).querySelector('i').className = t === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
        });
      }
      makeToggle('toggleCurrent', 'currentPassword');
      makeToggle('toggleNew', 'newPassword');
      makeToggle('toggleConfirm', 'confirmPassword');

      // Strength & requirements
      newPw.addEventListener('input', () => {
        const val = newPw.value;
        const hasUpper = /[A-Z]/.test(val);
        const hasLower = /[a-z]/.test(val);
        const hasDigit = /[0-9]/.test(val);
        const hasSpecial = /[^A-Za-z0-9]/.test(val);
        const hasLen = val.length >= 8;

        function setReq(id, ok) {
          const el = document.getElementById(id);
          el.className = ok ? 'ok' : 'no';
          el.innerHTML = ok ? '<i class="fas fa-check-circle"></i> ' : '<i class="fas fa-times-circle"></i> ';
          el.innerHTML += id === 'reqUpper' ? 'Uppercase' : id === 'reqLower' ? 'Lowercase' : id === 'reqDigit' ? 'Digit' : id === 'reqSpecial' ? 'Special' : '8+ chars';
        }
        setReq('reqUpper', hasUpper);
        setReq('reqLower', hasLower);
        setReq('reqDigit', hasDigit);
        setReq('reqSpecial', hasSpecial);
        setReq('reqLength', hasLen);

        let score = 0;
        if (hasLen) score++;
        if (val.length >= 12) score++;
        if (hasUpper) score++;
        if (hasLower) score++;
        if (hasDigit) score++;
        if (hasSpecial) score++;
        const pct = score <= 2 ? '25%' : score <= 3 ? '50%' : score <= 4 ? '75%' : '100%';
        const color = score <= 2 ? '#EF4444' : score <= 3 ? '#F59E0B' : score <= 4 ? '#3B82F6' : '#10B981';
        strengthBar.style.width = pct;
        strengthBar.style.background = color;
      });

      function showError(msg) { errorEl.textContent = msg; errorEl.classList.add('visible'); }
      function hideError() { errorEl.classList.remove('visible'); }
      function showSuccess(msg) { successEl.textContent = msg; successEl.classList.add('visible'); }
      function hideSuccess() { successEl.classList.remove('visible'); }

      function setLoading(l) { submitBtn.disabled = l; submitBtn.classList.toggle('loading', l); }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();
        hideSuccess();

        const cp = curPw.value;
        const np = newPw.value;
        const cf = conPw.value;

        if (!cp) { showError('Please enter your current password.'); return; }
        if (np.length < 8) { showError('New password must be at least 8 characters.'); return; }
        if (np !== cf) { showError('New passwords do not match.'); return; }

        setLoading(true);
        try {
          const result = await SmartCampusAPI.authChangePassword(cp, np, cf);
          showSuccess(result.message || 'Password changed successfully!');
          localStorage.removeItem('sc_force_password_change');
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
        } catch (ex) {
          showError(ex.message || 'Password change failed. Please try again.');
        } finally {
          setLoading(false);
        }
      });
    })();
  </script>
</body>
</html>
