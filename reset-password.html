<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Njala University SmartCampus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy: #0A192F; --navy-light: #112240; --gold: #C9A84C;
      --white: #FFFFFF; --gray-50: #F8FAFC; --gray-100: #F1F5F9;
      --gray-200: #E2E8F0; --gray-300: #CBD5E1; --gray-400: #94A3B8;
      --gray-500: #64748B; --gray-600: #475569; --gray-700: #334155;
      --gray-900: #0F172A; --success: #10B981; --error: #EF4444;
      --info: #3B82F6; --radius: 12px; --transition: all 0.2s ease;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem;
    }
    .card { max-width: 440px; width: 100%; background: var(--white); border-radius: var(--radius); box-shadow: 0 8px 40px rgba(0,0,0,.12); overflow: hidden; }
    .header { background: var(--navy); padding: 2rem; text-align: center; }
    .header h1 { color: var(--white); font-size: 1.2rem; font-weight: 700; }
    .header p { color: var(--gray-400); font-size: 0.85rem; margin-top: 0.25rem; }
    .body { padding: 2rem; }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--gray-700); margin-bottom: 0.35rem; }
    .input-wrapper { position: relative; display: flex; align-items: center; }
    .input-wrapper .icon { position: absolute; left: 12px; color: var(--gray-400); pointer-events: none; }
    .input-wrapper input { width: 100%; padding: 0.75rem 0.75rem 0.75rem 2.5rem; border: 1.5px solid var(--gray-200); border-radius: 8px; font-size: 0.9rem; font-family: inherit; transition: var(--transition); background: var(--gray-50); }
    .input-wrapper input:focus { outline: none; border-color: var(--navy); box-shadow: 0 0 0 3px rgba(10,25,47,.08); }
    .input-wrapper .toggle { position: absolute; right: 12px; background: none; border: none; color: var(--gray-400); cursor: pointer; padding: 4px; }
    .input-wrapper .toggle:hover { color: var(--gray-600); }
    .btn { width: 100%; padding: 0.8rem; background: var(--navy); color: var(--white); border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: var(--transition); font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .btn:hover { background: var(--navy-light); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg { display: none; background: #FEF2F2; color: var(--error); font-size: 0.85rem; padding: 0.65rem 0.85rem; border-radius: 8px; margin-bottom: 1rem; text-align: center; border: 1px solid #FECACA; }
    .error-msg.visible { display: block; }
    .success-msg { display: none; background: #F0FDF4; color: #166534; font-size: 0.85rem; padding: 0.65rem 0.85rem; border-radius: 8px; margin-bottom: 1rem; text-align: center; border: 1px solid #BBF7D0; }
    .success-msg.visible { display: block; }
    .back-link { display: block; text-align: center; margin-top: 1rem; font-size: 0.85rem; color: var(--info); text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
    .spinner { display: none; }
    .btn.loading .spinner { display: inline-block; animation: spin 0.8s linear infinite; }
    .btn.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .strength { height: 4px; border-radius: 2px; margin-top: 6px; background: var(--gray-200); overflow: hidden; }
    .strength-bar { height: 100%; width: 0%; border-radius: 2px; transition: width 0.3s ease, background 0.3s ease; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1><i class="fas fa-lock"></i> Reset Password</h1>
      <p>Create a new password for your account</p>
    </div>
    <div class="body">
      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <form id="resetForm">
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock icon"></i>
            <input type="password" id="newPassword" placeholder="At least 8 characters" required minlength="8">
            <button type="button" class="toggle" id="toggleNew" tabindex="-1"><i class="fas fa-eye"></i></button>
          </div>
          <div class="strength"><div class="strength-bar" id="strengthBar"></div></div>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="input-wrapper">
            <i class="fas fa-check-circle icon"></i>
            <input type="password" id="confirmPassword" placeholder="Re-enter new password" required minlength="8">
            <button type="button" class="toggle" id="toggleConfirm" tabindex="-1"><i class="fas fa-eye"></i></button>
          </div>
        </div>
        <button type="submit" class="btn" id="submitBtn">
          <i class="fas fa-save"></i>
          <span class="btn-text">Reset Password</span>
          <span class="spinner"><i class="fas fa-spinner"></i></span>
        </button>
      </form>

      <a href="login.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Login</a>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');

      if (!token) {
        document.getElementById('errorMsg').textContent = 'Invalid or missing reset token. Please request a new password reset.';
        document.getElementById('errorMsg').classList.add('visible');
        document.getElementById('submitBtn').disabled = true;
      }

      const form = document.getElementById('resetForm');
      const newPw = document.getElementById('newPassword');
      const confirmPw = document.getElementById('confirmPassword');
      const errorEl = document.getElementById('errorMsg');
      const successEl = document.getElementById('successMsg');
      const submitBtn = document.getElementById('submitBtn');
      const strengthBar = document.getElementById('strengthBar');

      document.getElementById('toggleNew').addEventListener('click', () => {
        const t = newPw.type === 'password' ? 'text' : 'password';
        newPw.type = t;
        document.getElementById('toggleNew').querySelector('i').className = t === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
      });
      document.getElementById('toggleConfirm').addEventListener('click', () => {
        const t = confirmPw.type === 'password' ? 'text' : 'password';
        confirmPw.type = t;
        document.getElementById('toggleConfirm').querySelector('i').className = t === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
      });

      newPw.addEventListener('input', () => {
        const val = newPw.value;
        if (!val) { strengthBar.style.width = '0%'; return; }
        let score = 0;
        if (val.length >= 8) score++;
        if (val.length >= 12) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[a-z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        const pct = score <= 2 ? '25%' : score <= 3 ? '50%' : score <= 4 ? '75%' : '100%';
        const color = score <= 2 ? '#EF4444' : score <= 3 ? '#F59E0B' : score <= 4 ? '#3B82F6' : '#10B981';
        strengthBar.style.width = pct;
        strengthBar.style.background = color;
      });

      function showError(msg) { errorEl.textContent = msg; errorEl.classList.add('visible'); }
      function hideError() { errorEl.classList.remove('visible'); }
      function showSuccess(msg) { successEl.textContent = msg; successEl.classList.add('visible'); }
      function hideSuccess() { successEl.classList.remove('visible'); }

      function setLoading(l) { submitBtn.disabled = l; submitBtn.classList.toggle('loading', l); }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();
        hideSuccess();

        if (!token) { showError('Reset token missing. Please request a new reset.'); return; }

        const np = newPw.value;
        const cp = confirmPw.value;

        if (np.length < 8) { showError('Password must be at least 8 characters.'); return; }
        if (np !== cp) { showError('Passwords do not match.'); return; }

        setLoading(true);
        try {
          const result = await SmartCampusAPI.resetPassword(token, np, cp);
          showSuccess(result.message || 'Password reset successful!');
          setTimeout(() => { window.location.href = 'login.html?reset=success'; }, 1500);
        } catch (ex) {
          showError(ex.message || 'Reset failed. Please try again.');
        } finally {
          setLoading(false);
        }
      });
    })();
  </script>
</body>
</html>
